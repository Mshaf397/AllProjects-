<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hyper-Grid EDO Synth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --zinc-950: #09090b; --zinc-900: #18181b; }
        body { 
            background-color: var(--zinc-950); 
            color: #f4f4f5; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column;
            overflow: hidden;
            font-family: ui-sans-serif, system-ui, sans-serif;
            touch-action: none; 
        }
        
        .scroll-viewport {
            flex-grow: 1;
            overflow: auto;
            position: relative;
            background: #000;
        }

        .grid-container {
            display: grid;
            gap: 1px;
            background-color: #27272a;
            width: max-content;
            height: max-content;
        }

        .grid-cell {
            background-color: #111113;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            user-select: none;
            transition: background-color 0.1s;
        }

        .grid-cell.active {
            background-color: #3f3f46;
            color: #fff;
            box-shadow: inset 0 0 20px rgba(255,255,255,0.1);
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: #18181b;
            border: 1px solid #3f3f46;
            padding: 1.5rem;
            border-radius: 12px;
            width: 95%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }

        input[type="number"], input[type="text"], select {
            background: #09090b;
            border: 1px solid #3f3f46;
            color: white;
            padding: 12px;
            border-radius: 6px;
            width: 100%;
            font-family: monospace;
            font-size: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.25rem;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #a1a1aa;
        }

        .partial-row {
            display: grid;
            grid-template-columns: 1fr 1fr 40px;
            gap: 8px;
            margin-bottom: 8px;
            align-items: end;
        }

        .btn-action {
            background: #27272a;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.7rem;
            border: 1px solid #3f3f46;
            text-transform: uppercase;
            font-weight: bold;
            white-space: nowrap;
        }

        .btn-action:hover { background: #3f3f46; }

        .btn-record {
            background: #450a0a;
            border-color: #991b1b;
            color: #fca5a5;
        }
        .btn-record.active {
            background: #991b1b;
            color: white;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .step-pill {
            padding: 8px;
            border: 1px solid #3f3f46;
            border-radius: 6px;
            text-align: center;
            font-size: 0.75rem;
            cursor: pointer;
            background: #09090b;
        }
        .step-pill.selected {
            background: #10b981;
            border-color: #34d399;
            color: #064e3b;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="flex items-center justify-between p-2 sm:p-3 bg-zinc-900 border-b border-zinc-800 shrink-0 z-50 overflow-x-auto">
        <div class="flex items-center gap-2 sm:gap-3 shrink-0 mr-2">
            <h1 class="text-[10px] sm:text-xs font-black tracking-widest uppercase text-zinc-400">Hyper-Grid</h1>
            <button id="recordBtn" class="btn-action btn-record">REC</button>
            <button id="downloadBtn" class="btn-action hidden">SAVE .WAV</button>
        </div>
        
        <div class="flex gap-1.5 sm:gap-2">
            <button id="openTuning" class="btn-action">Tuning</button>
            <button id="openScale" class="btn-action">Scale</button>
            <button id="openTimbre" class="btn-action">Layout</button>
            <button id="sustainBtn" class="btn-action !bg-zinc-800">Sus: OFF</button>
            <div class="w-16 sm:w-24 hidden xs:block">
                <input type="range" id="masterVol" min="0" max="1" step="0.01" value="0.3" class="w-full mt-2">
            </div>
        </div>
    </div>

    <div class="scroll-viewport" id="viewport">
        <div id="gridWrapper" class="grid-container"></div>
    </div>

    <!-- Tuning Modal -->
    <div id="tuningModal" class="modal">
        <div class="modal-content space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-lg font-bold text-emerald-400">System Tuning</h2>
                <button onclick="closeModals()" class="text-zinc-500 hover:text-white text-2xl">&times;</button>
            </div>
            <div class="space-y-4">
                <div>
                    <label>EDO (Steps per Octave)</label>
                    <input type="number" id="edoInput" value="12">
                </div>
                <div>
                    <label>Reference Frequency (Hz for C4)</label>
                    <input type="number" id="baseFreq" value="261.63" step="0.01">
                </div>
            </div>
            <button onclick="saveAndApply()" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-lg hover:bg-emerald-500">Apply Tuning</button>
        </div>
    </div>

    <!-- Scale Modal -->
    <div id="scaleModal" class="modal">
        <div class="modal-content space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-lg font-bold">Scale Generation</h2>
                <button onclick="closeModals()" class="text-zinc-500 hover:text-white text-2xl">&times;</button>
            </div>
            
            <div class="flex bg-zinc-950 p-1 rounded-lg">
                <button id="tabGenerator" class="flex-1 py-2 text-[10px] uppercase font-bold rounded bg-zinc-800 text-white">Generator Chain</button>
                <button id="tabManual" class="flex-1 py-2 text-[10px] uppercase font-bold rounded text-zinc-500">Manual Selection</button>
            </div>

            <div id="modeGenerator" class="space-y-4">
                <div>
                    <label>Generator (EDO Steps)</label>
                    <input type="number" id="scaleGenerator" value="7">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label>Gens Up</label><input type="number" id="scaleGensUp" value="6"></div>
                    <div><label>Gens Down</label><input type="number" id="scaleGensDown" value="0"></div>
                </div>
            </div>

            <div id="modeManual" class="hidden space-y-4">
                <label>Select EDO Steps for Octave</label>
                <div id="stepPicker" class="grid grid-cols-4 sm:grid-cols-6 gap-2 max-h-48 overflow-y-auto p-1"></div>
            </div>

            <div class="flex items-center justify-between border-t border-zinc-800 pt-4">
                <p class="text-[10px] text-zinc-400 italic">Notes in Scale: <span id="scaleTotalSize">0</span></p>
                <button onclick="clearScale()" class="text-[10px] text-red-400 uppercase font-bold">Reset Chromatic</button>
            </div>
            
            <button id="applyScaleBtn" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-lg hover:bg-emerald-500 uppercase tracking-widest text-sm">Apply Scale Mapping</button>
        </div>
    </div>

    <!-- Layout & Timbre Modal -->
    <div id="timbreModal" class="modal">
        <div class="modal-content space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-lg font-bold">Layout & Sound</h2>
                <button onclick="closeModals()" class="text-zinc-500 hover:text-white text-2xl">&times;</button>
            </div>
            <div class="space-y-6">
                <div class="bg-zinc-950 p-3 rounded-lg border border-zinc-800">
                    <h3 class="text-[10px] uppercase tracking-widest text-emerald-400 font-bold mb-3">Isomorphic Grid Logic</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label>Horizontal Gap</label>
                            <input type="number" id="hGap" value="1">
                        </div>
                        <div>
                            <label>Vertical Gap</label>
                            <input type="number" id="vGap" value="5">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mt-4">
                        <div><label>Grid Rows</label><input type="number" id="gridRows" value="12"></div>
                        <div><label>Grid Cols</label><input type="number" id="gridCols" value="12"></div>
                    </div>
                </div>

                <div>
                    <label>Cell Size (px)</label>
                    <input type="number" id="cellSize" value="100">
                </div>

                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label>Partials (Harmonics)</label>
                        <button id="addPartial" class="text-[10px] bg-zinc-700 px-2 py-1 rounded">+ Add</button>
                    </div>
                    <div id="partialsList" class="max-h-48 overflow-y-auto pr-2"></div>
                </div>

                <div>
                    <label>Envelope (ADSR)</label>
                    <div class="grid grid-cols-4 gap-2">
                        <div><label class="text-[9px]">A</label><input type="number" id="envA" value="0.05" step="0.01"></div>
                        <div><label class="text-[9px]">D</label><input type="number" id="envD" value="0.2" step="0.01"></div>
                        <div><label class="text-[9px]">S</label><input type="number" id="envS" value="0.7" step="0.1"></div>
                        <div><label class="text-[9px]">R</label><input type="number" id="envR" value="0.6" step="0.1"></div>
                    </div>
                </div>
            </div>
            <button onclick="saveAndApply()" class="w-full bg-white text-black font-bold py-3 rounded-lg hover:bg-zinc-200 uppercase text-sm">Save & Update Grid</button>
        </div>
    </div>

    <script>
        const FIFTHS_NAMES = ["Fbb","Cbb","Gbb","Dbb","Abb","Ebb","Bbb","Fb","Cb","Gb","Db","Ab","Eb","Bb","F","C","G","D","A","E","B","F#","C#","G#","D#","A#","E#","B#","Fx","Cx","Gx","Dx","Ax","Ex","Bx"];
        const C_FIFTH_INDEX = 15;
        let currentScaleMapping = null;
        let scaleMode = 'generator';
        let manualSteps = new Set([0]);

        function getNoteName(totalSteps, edo) {
            const targetFifthCents = 701.955;
            const fifthSteps = Math.round((targetFifthCents / 1200) * edo);
            let step = Number(((BigInt(totalSteps) % BigInt(edo)) + BigInt(edo)) % BigInt(edo));
            let octave = 4 + Math.floor(totalSteps / edo);
            let best = { name: "", dist: Infinity, accs: Infinity, rawName: "" };
            for (let i = 0; i < FIFTHS_NAMES.length; i++) {
                const fOffset = i - C_FIFTH_INDEX;
                const stepPos = (((fOffset * fifthSteps) % edo) + edo) % edo;
                let diff = step - stepPos;
                if (diff > edo / 2) diff -= edo;
                if (diff < -edo / 2) diff += edo;
                const accCount = Math.abs(diff);
                if (accCount < best.accs || (accCount === best.accs && Math.abs(fOffset) < best.dist)) {
                    let prefix = (diff > 0) ? "^".repeat(diff) : (diff < 0 ? "v".repeat(Math.abs(diff)) : "");
                    best = { name: prefix + FIFTHS_NAMES[i], dist: Math.abs(fOffset), accs: accCount, rawName: FIFTHS_NAMES[i] };
                }
            }
            return `${best.name}${octave}`;
        }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const masterGain = audioCtx.createGain();
        masterGain.connect(audioCtx.destination);
        
        // Recording Setup
        const recordingDest = audioCtx.createMediaStreamDestination();
        masterGain.connect(recordingDest);
        let mediaRecorder;
        let recordedChunks = [];
        let isRecording = false;
        let lastBlobUrl = null;

        function initRecorder() {
            mediaRecorder = new MediaRecorder(recordingDest.stream);
            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'audio/wav' });
                // Note: Standard MediaRecorder produces specific formats (usually webm/ogg).
                // To force a 64-bit WAV file as requested, we process the raw buffer data manually.
                exportWAV64(recordedChunks);
                recordedChunks = [];
            };
        }

        // 64-bit Floating Point WAV Exporter
        async function exportWAV64(chunks) {
            const blob = new Blob(chunks);
            const arrayBuffer = await blob.arrayBuffer();
            const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            
            const numChannels = audioBuffer.numberOfChannels;
            const sampleRate = audioBuffer.sampleRate;
            const length = audioBuffer.length;
            const bytesPerSample = 8; // 64-bit float
            const buffer = new ArrayBuffer(44 + length * numChannels * bytesPerSample);
            const view = new DataView(buffer);

            const writeString = (offset, string) => {
                for (let i = 0; i < string.length; i++) {
                    view.setUint8(offset + i, string.charCodeAt(i));
                }
            };

            writeString(0, 'RIFF');
            view.setUint32(4, 36 + length * numChannels * bytesPerSample, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 3, true); // IEEE Float
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * numChannels * bytesPerSample, true);
            view.setUint16(32, numChannels * bytesPerSample, true);
            view.setUint16(34, bytesPerSample * 8, true);
            writeString(36, 'data');
            view.setUint32(40, length * numChannels * bytesPerSample, true);

            let offset = 44;
            for (let i = 0; i < length; i++) {
                for (let channel = 0; channel < numChannels; channel++) {
                    const sample = audioBuffer.getChannelData(channel)[i];
                    view.setFloat64(offset, sample, true);
                    offset += 8;
                }
            }

            const wavBlob = new Blob([buffer], { type: 'audio/wav' });
            if (lastBlobUrl) URL.revokeObjectURL(lastBlobUrl);
            lastBlobUrl = URL.createObjectURL(wavBlob);
            
            const dlBtn = document.getElementById('downloadBtn');
            dlBtn.classList.remove('hidden');
            dlBtn.onclick = () => {
                const link = document.createElement('a');
                link.href = lastBlobUrl;
                link.download = `elul-nigun-session-${Date.now()}.wav`;
                link.click();
            };
        }

        let activeVoices = new Map();
        let sustain = false;

        function playNote(totalSteps, edo, freqBase) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const freq = freqBase * Math.pow(2, totalSteps / edo);
            const now = audioCtx.currentTime;
            const partials = Array.from(document.querySelectorAll('.partial-row')).map(row => {
                let rStr = row.querySelector('.p-ratio').value;
                let r = rStr.includes('/') ? rStr.split('/').map(Number).reduce((a,b)=>a/b) : parseFloat(rStr);
                return { ratio: r || 1, vol: (parseFloat(row.querySelector('.p-vol').value) || 0) / 100 };
            });
            const A = Math.max(0.001, parseFloat(document.getElementById('envA').value));
            const D = Math.max(0.001, parseFloat(document.getElementById('envD').value));
            const S = parseFloat(document.getElementById('envS').value);
            const masterVol = parseFloat(document.getElementById('masterVol').value);

            const voiceGain = audioCtx.createGain();
            voiceGain.gain.setValueAtTime(0, now);
            voiceGain.gain.linearRampToValueAtTime(masterVol, now + A);
            voiceGain.gain.linearRampToValueAtTime(masterVol * S, now + A + D);
            voiceGain.connect(masterGain);

            const oscillators = partials.map(p => {
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.frequency.setValueAtTime(freq * p.ratio, now);
                g.gain.value = p.vol;
                osc.connect(g);
                g.connect(voiceGain);
                osc.start();
                return osc;
            });
            return { oscillators, gainNode: voiceGain, release: parseFloat(document.getElementById('envR').value) };
        }

        function stopNote(voice) {
            if (!voice) return;
            const now = audioCtx.currentTime;
            voice.gainNode.gain.cancelScheduledValues(now);
            voice.gainNode.gain.setValueAtTime(voice.gainNode.gain.value, now);
            voice.gainNode.gain.setTargetAtTime(0, now, voice.release / 4);
            setTimeout(() => {
                voice.oscillators.forEach(o => { try { o.stop(); } catch(e){} });
                voice.gainNode.disconnect();
            }, voice.release * 1000 + 100);
        }

        const gridWrapper = document.getElementById('gridWrapper');

        function renderGrid() {
            const rows = parseInt(document.getElementById('gridRows').value) || 12;
            const cols = parseInt(document.getElementById('gridCols').value) || 12;
            const hGap = parseInt(document.getElementById('hGap').value);
            const vGap = parseInt(document.getElementById('vGap').value);
            const cellSize = parseInt(document.getElementById('cellSize').value) || 100;
            const edo = parseInt(document.getElementById('edoInput').value) || 12;
            const baseFreq = parseFloat(document.getElementById('baseFreq').value) || 261.63;

            gridWrapper.style.gridTemplateColumns = `repeat(${cols}, ${cellSize}px)`;
            gridWrapper.innerHTML = '';
            
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    cell.style.width = cellSize + 'px';
                    cell.style.height = cellSize + 'px';
                    const keyId = `r${r}c${c}`;
                    cell.dataset.key = keyId;
                    
                    const relR = ((rows-1) - r);
                    const linearIdx = (relR * vGap) + (c * hGap);

                    let steps;
                    if (currentScaleMapping) {
                        const sz = currentScaleMapping.length;
                        const oct = Math.floor(linearIdx / sz);
                        const sStep = ((linearIdx % sz) + sz) % sz;
                        steps = (oct * edo) + currentScaleMapping[sStep];
                    } else {
                        steps = linearIdx;
                    }

                    cell.innerHTML = `
                        <span class="font-bold pointer-events-none">${getNoteName(steps, edo)}</span>
                        <span class="text-[8px] opacity-30 mt-1 pointer-events-none">${(baseFreq * Math.pow(2, steps/edo)).toFixed(1)}Hz</span>
                    `;
                    cell.dataset.steps = steps;
                    gridWrapper.appendChild(cell);
                }
            }
        }

        gridWrapper.addEventListener('pointerdown', (e) => {
            const target = e.target.closest('.grid-cell');
            if (!target) return;
            const key = target.dataset.key;
            if (activeVoices.has(key)) {
                stopNote(activeVoices.get(key));
                activeVoices.delete(key);
                target.classList.remove('active');
            } else {
                target.classList.add('active');
                activeVoices.set(key, playNote(parseInt(target.dataset.steps), parseInt(document.getElementById('edoInput').value), parseFloat(document.getElementById('baseFreq').value)));
            }
        });

        window.addEventListener('pointerup', () => {
            if (!sustain) {
                activeVoices.forEach((v, k) => {
                    stopNote(v);
                    const cell = document.querySelector(`[data-key="${k}"]`);
                    if (cell) cell.classList.remove('active');
                });
                activeVoices.clear();
            }
        });

        // Controls
        document.getElementById('recordBtn').onclick = (e) => {
            if (!isRecording) {
                if (!mediaRecorder) initRecorder();
                recordedChunks = [];
                mediaRecorder.start();
                isRecording = true;
                e.target.innerText = "STOP";
                e.target.classList.add('active');
                document.getElementById('downloadBtn').classList.add('hidden');
            } else {
                mediaRecorder.stop();
                isRecording = false;
                e.target.innerText = "REC";
                e.target.classList.remove('active');
            }
        };

        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
        function saveAndApply() { closeModals(); renderGrid(); }

        document.getElementById('openTuning').onclick = () => document.getElementById('tuningModal').style.display = 'flex';
        document.getElementById('openScale').onclick = () => { refreshManualStepPicker(); document.getElementById('scaleModal').style.display = 'flex'; };
        document.getElementById('openTimbre').onclick = () => document.getElementById('timbreModal').style.display = 'flex';

        document.getElementById('tabGenerator').onclick = () => setScaleMode('generator');
        document.getElementById('tabManual').onclick = () => setScaleMode('manual');

        function setScaleMode(mode) {
            scaleMode = mode;
            const isGen = mode === 'generator';
            document.getElementById('modeGenerator').classList.toggle('hidden', !isGen);
            document.getElementById('modeManual').classList.toggle('hidden', isGen);
            document.getElementById('tabGenerator').classList.toggle('bg-zinc-800', isGen);
            document.getElementById('tabManual').classList.toggle('bg-zinc-800', !isGen);
        }

        function refreshManualStepPicker() {
            const edo = parseInt(document.getElementById('edoInput').value);
            const container = document.getElementById('stepPicker');
            container.innerHTML = '';
            for (let i = 0; i < edo; i++) {
                const pill = document.createElement('div');
                pill.className = `step-pill ${manualSteps.has(i) ? 'selected' : ''}`;
                pill.innerText = i;
                pill.onclick = () => {
                    if (manualSteps.has(i)) manualSteps.delete(i); else manualSteps.add(i);
                    pill.classList.toggle('selected');
                    updateScaleCountDisplay();
                };
                container.appendChild(pill);
            }
            updateScaleCountDisplay();
        }

        function updateScaleCountDisplay() {
            if (scaleMode === 'manual') document.getElementById('scaleTotalSize').innerText = manualSteps.size;
            else document.getElementById('scaleTotalSize').innerText = currentScaleMapping ? currentScaleMapping.length : 0;
        }

        document.getElementById('applyScaleBtn').onclick = () => {
            if (scaleMode === 'generator') {
                const edo = parseInt(document.getElementById('edoInput').value);
                const gen = parseInt(document.getElementById('scaleGenerator').value);
                const up = parseInt(document.getElementById('scaleGensUp').value);
                const down = parseInt(document.getElementById('scaleGensDown').value);
                let s = new Set(); s.add(0);
                for (let i = 1; i <= up; i++) s.add(((i * gen) % edo + edo) % edo);
                for (let i = 1; i <= down; i++) s.add(((-i * gen) % edo + edo) % edo);
                currentScaleMapping = Array.from(s).sort((a,b)=>a-b);
            } else {
                currentScaleMapping = Array.from(manualSteps).sort((a,b)=>a-b);
                if (currentScaleMapping.length === 0) currentScaleMapping = null;
            }
            saveAndApply();
        };

        function clearScale() { currentScaleMapping = null; manualSteps = new Set([0]); saveAndApply(); }

        document.getElementById('sustainBtn').onclick = (e) => {
            sustain = !sustain;
            e.target.innerText = `Sus: ${sustain ? 'ON' : 'OFF'}`;
            e.target.classList.toggle('bg-zinc-700', sustain);
            if (!sustain) {
                activeVoices.forEach((v, k) => { stopNote(v); const c = document.querySelector(`[data-key="${k}"]`); if (c) c.classList.remove('active'); });
                activeVoices.clear();
            }
        };

        function createPartialRow(ratio = "1", vol = "100") {
            const d = document.createElement('div'); d.className = 'partial-row';
            d.innerHTML = `<div><label>Ratio</label><input type="text" class="p-ratio" value="${ratio}"></div>
                           <div><label>Vol (%)</label><input type="number" class="p-vol" min="0" max="100" value="${vol}"></div>
                           <button class="remove-p text-red-500 mb-2">×</button>`;
            d.querySelector('.remove-p').onclick = () => d.remove();
            return d;
        }

        document.getElementById('addPartial').onclick = () => document.getElementById('partialsList').appendChild(createPartialRow("1", "50"));
        
        // Initial setup
        document.getElementById('partialsList').appendChild(createPartialRow("1", "100"));
        document.getElementById('partialsList').appendChild(createPartialRow("2", "40"));
        document.getElementById('partialsList').appendChild(createPartialRow("3", "20"));
        window.onload = renderGrid;
    </script>
</body>
