<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronos Custom Temporal Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@500&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            color: #f1f5f9;
        }

        .mono { font-family: 'JetBrains+Mono', monospace; }

        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(51, 65, 85, 0.5);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .day-btn {
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.75rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .day-btn:hover { background: #1e293b; }
        .day-btn.active { background: #2563eb; color: white; transform: scale(1.05); box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.4); }
        .day-btn.today { border: 2px solid #3b82f6; }

        input[type="number"], input[type="datetime-local"] {
            background: #1e293b;
            border: 1px solid #334155;
            color: white;
            padding: 0.5rem;
            border-radius: 0.5rem;
            outline: none;
        }

        input:focus { border-color: #3b82f6; ring: 2px solid #3b82f6; }

        .tab-btn {
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .tab-btn.active { background: #2563eb; color: white; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto space-y-6">
        <!-- Header -->
        <header class="glass p-6 rounded-3xl flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-4">
                <div class="p-3 bg-blue-600 rounded-2xl">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                </div>
                <div>
                    <h1 class="text-xl font-extrabold tracking-tight">CHRONOS CUSTOM</h1>
                    <p class="text-[10px] text-blue-400 font-bold uppercase tracking-[0.2em]">Temporal Mechanics v1.0</p>
                </div>
            </div>

            <nav class="flex gap-2 bg-slate-900/80 p-1 rounded-xl">
                <button onclick="switchTab('clock')" id="tab-clock" class="tab-btn active">Clock</button>
                <button onclick="switchTab('calendar')" id="tab-calendar" class="tab-btn">Calendar</button>
                <button onclick="switchTab('config')" id="tab-config" class="tab-btn">Config</button>
            </nav>
        </header>

        <!-- Main Display Areas -->
        <main id="main-content">
            <!-- Clock Tab -->
            <section id="content-clock" class="space-y-6">
                <div class="glass p-12 rounded-[3rem] border-blue-500/20 text-center relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-blue-500 to-transparent"></div>
                    <div id="big-clock" class="text-6xl md:text-8xl font-black tracking-tighter tabular-nums mb-4">00:00:00</div>
                    <div id="big-date" class="text-blue-400 font-bold tracking-widest uppercase text-sm">Year 0 • Day 0</div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="glass p-6 rounded-3xl">
                        <h3 class="text-xs font-bold text-orange-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
                            Solar Today
                        </h3>
                        <div class="space-y-3">
                            <div class="flex justify-between border-b border-slate-800 pb-2">
                                <span class="text-slate-400 text-sm">Sunrise</span>
                                <span id="today-sunrise" class="font-bold">--:--:--</span>
                            </div>
                            <div class="flex justify-between border-b border-slate-800 pb-2">
                                <span class="text-slate-400 text-sm">Sunset</span>
                                <span id="today-sunset" class="font-bold">--:--:--</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-slate-400 text-sm">Earth UTC</span>
                                <span id="earth-time" class="font-medium text-slate-500">--:--:--</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="glass p-6 rounded-3xl flex flex-col justify-center items-center text-center">
                        <div class="text-3xl font-black text-blue-500" id="percent-day">0.0%</div>
                        <div class="text-[10px] text-slate-500 uppercase font-bold mt-1">Of Current Day Passed</div>
                    </div>
                </div>
            </section>

            <!-- Calendar Tab -->
            <section id="content-calendar" class="hidden grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 glass p-6 rounded-3xl">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-xl font-bold flex items-center gap-2">
                            <span id="cal-year-label">Year 0</span>
                        </h2>
                        <div class="flex gap-2">
                            <button onclick="changeCalYear(-1)" class="p-2 hover:bg-slate-800 rounded-lg">←</button>
                            <button onclick="changeCalYear(1)" class="p-2 hover:bg-slate-800 rounded-lg">→</button>
                        </div>
                    </div>
                    <div id="calendar-body" class="calendar-grid">
                        <!-- Days injected by JS -->
                    </div>
                </div>

                <div class="glass p-6 rounded-3xl border-blue-500/30">
                    <h3 id="details-title" class="font-bold text-lg mb-4">Day Details</h3>
                    <div id="day-details-content" class="space-y-4">
                        <div class="bg-slate-800/50 p-4 rounded-2xl border border-slate-700 text-center">
                            <div class="text-[10px] text-slate-400 font-bold uppercase mb-1">Sunrise → Sunset</div>
                            <div id="det-sun-range" class="text-lg font-black text-orange-400">--:--:-- → --:--:--</div>
                        </div>
                        <div id="twilight-list" class="space-y-2">
                            <!-- Twilights injected here -->
                        </div>
                    </div>
                </div>
            </section>

            <!-- Config Tab -->
            <section id="content-config" class="hidden glass p-8 rounded-3xl">
                <h2 class="text-xl font-bold mb-6">System Variables</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="space-y-4">
                        <h4 class="text-xs font-bold text-blue-400 uppercase tracking-widest">Temporal Units</h4>
                        <div class="space-y-2" id="unit-inputs">
                            <!-- Inputs generated by JS -->
                        </div>
                    </div>
                    <div class="space-y-4">
                        <h4 class="text-xs font-bold text-orange-400 uppercase tracking-widest">Solar Parameters</h4>
                        <div class="space-y-2" id="solar-inputs">
                            <!-- Inputs generated by JS -->
                        </div>
                    </div>
                </div>
                <div class="mt-8 pt-6 border-t border-slate-800">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Reference Epoch (ISO)</label>
                    <input type="datetime-local" id="input-epoch" class="w-full" onchange="updateConfig('epoch', new Date(this.value).getTime())">
                </div>
            </section>
        </main>

        <footer class="text-center text-[10px] text-slate-600 font-bold tracking-[0.3em] uppercase py-8">
            Engineered for Precision
        </footer>
    </div>

    <script>
        // --- State ---
        let config = {
            msPerSec: 1000,
            secPerMin: 60,
            minPerHour: 60,
            hourPerDay: 24,
            dayPerYear: 365,
            epoch: new Date('2024-01-01T00:00:00Z').getTime(),
            sunriseWinterPct: 35,
            sunriseSummerPct: 15,
            secPerDegEquinox: 240,
            secPerDegSolstice: 300
        };

        let viewYear = 0;
        let selectedDay = 0;

        // --- Core Logic ---
        function getCustomTime(earthMs) {
            const totalEarthSecs = (earthMs - config.epoch) / 1000;
            const customSecsTotal = totalEarthSecs / (config.msPerSec / 1000);
            
            const secsInDay = config.secPerMin * config.minPerHour * config.hourPerDay;
            const secsInYear = secsInDay * config.dayPerYear;
            const secsInHour = config.secPerMin * config.minPerHour;

            const year = Math.floor(customSecsTotal / secsInYear);
            const dayOfYear = Math.floor((customSecsTotal % secsInYear) / secsInDay);
            const hour = Math.floor((customSecsTotal % secsInDay) / secsInHour);
            const min = Math.floor((customSecsTotal % secsInHour) / config.secPerMin);
            const sec = Math.floor(customSecsTotal % config.secPerMin);
            const pct = ((customSecsTotal % secsInDay) / secsInDay) * 100;

            return { year, dayOfYear, hour, min, sec, pct };
        }

        function formatTime(s) {
            const h = Math.floor(s / (config.minPerHour * config.secPerMin));
            const m = Math.floor((s % (config.minPerHour * config.secPerMin)) / config.secPerMin);
            const sc = Math.floor(s % config.secPerMin);
            return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(sc).padStart(2, '0')}`;
        }

        function getSolarStats(dayIndex) {
            const L = config.dayPerYear;
            // Solar interpolation
            const sunAmp = (config.sunriseWinterPct - 25);
            const sunrisePct = 25 + sunAmp * Math.cos((2 * Math.PI * dayIndex) / L);
            const sunsetPct = 100 - sunrisePct;

            const degAvg = (config.secPerDegEquinox + config.secPerDegSolstice) / 2;
            const degAmp = (config.secPerDegSolstice - config.secPerDegEquinox) / 2;
            const secPerDeg = degAvg + degAmp * Math.cos((4 * Math.PI * dayIndex) / L);

            const totalDaySecs = config.hourPerDay * config.minPerHour * config.secPerMin;
            const sRise = (sunrisePct / 100) * totalDaySecs;
            const sSet = (sunsetPct / 100) * totalDaySecs;

            const twilights = [
                { name: 'Civil', deg: 6 },
                { name: 'Halachic', deg: 8.5 },
                { name: 'Nautical', deg: 12 },
                { name: 'Astronomical', deg: 18 },
                { name: 'Zodiacal', deg: 24 },
            ].map(t => ({
                name: t.name,
                start: formatTime(sRise - (t.deg * secPerDeg)),
                end: formatTime(sSet + (t.deg * secPerDeg))
            }));

            return {
                sunrise: formatTime(sRise),
                sunset: formatTime(sSet),
                twilights
            };
        }

        // --- UI Updates ---
        function updateClock() {
            const now = Date.now();
            const ct = getCustomTime(now);
            
            document.getElementById('big-clock').textContent = 
                `${String(ct.hour).padStart(2, '0')}:${String(ct.min).padStart(2, '0')}:${String(ct.sec).padStart(2, '0')}`;
            document.getElementById('big-date').textContent = `Year ${ct.year} • Day ${ct.dayOfYear}`;
            document.getElementById('percent-day').textContent = ct.pct.toFixed(2) + '%';
            document.getElementById('earth-time').textContent = new Date().toLocaleTimeString('en-GB');

            const solar = getSolarStats(ct.dayOfYear);
            document.getElementById('today-sunrise').textContent = solar.sunrise;
            document.getElementById('today-sunset').textContent = solar.sunset;
        }

        function renderCalendar() {
            const container = document.getElementById('calendar-body');
            container.innerHTML = '';
            document.getElementById('cal-year-label').textContent = `Year ${viewYear}`;

            const now = Date.now();
            const ct = getCustomTime(now);

            for (let i = 0; i < config.dayPerYear; i++) {
                const btn = document.createElement('button');
                btn.className = 'day-btn text-[10px]';
                if (i === selectedDay) btn.classList.add('active');
                if (i === ct.dayOfYear && viewYear === ct.year) btn.classList.add('today');
                btn.textContent = i;
                btn.onclick = () => {
                    selectedDay = i;
                    renderCalendar();
                    updateDetails();
                };
                container.appendChild(btn);
            }
        }

        function updateDetails() {
            const stats = getSolarStats(selectedDay);
            document.getElementById('details-title').textContent = `Day ${selectedDay} Metrics`;
            document.getElementById('det-sun-range').textContent = `${stats.sunrise} → ${stats.sunset}`;
            
            const list = document.getElementById('twilight-list');
            list.innerHTML = '';
            stats.twilights.forEach(t => {
                const item = document.createElement('div');
                item.className = 'flex justify-between items-center p-3 rounded-xl bg-slate-800/30 text-[11px] border border-slate-800';
                item.innerHTML = `
                    <span class="font-bold text-slate-400 uppercase">${t.name}</span>
                    <div class="text-right mono">
                        <div class="text-blue-400">${t.start}</div>
                        <div class="text-orange-400">${t.end}</div>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        function initConfig() {
            const units = ['msPerSec', 'secPerMin', 'minPerHour', 'hourPerDay', 'dayPerYear'];
            const solar = ['sunriseWinterPct', 'sunriseSummerPct', 'secPerDegEquinox', 'secPerDegSolstice'];
            
            const uCont = document.getElementById('unit-inputs');
            const sCont = document.getElementById('solar-inputs');

            units.forEach(k => {
                uCont.innerHTML += `
                    <div class="flex justify-between items-center">
                        <label class="text-xs text-slate-500 capitalize">${k.replace(/([A-Z])/g, ' $1')}</label>
                        <input type="number" value="${config[k]}" onchange="updateConfig('${k}', this.value)" class="w-20 text-xs">
                    </div>
                `;
            });

            solar.forEach(k => {
                sCont.innerHTML += `
                    <div class="flex justify-between items-center">
                        <label class="text-xs text-slate-500 capitalize">${k.replace(/([A-Z])/g, ' $1')}</label>
                        <input type="number" value="${config[k]}" onchange="updateConfig('${k}', this.value)" class="w-20 text-xs">
                    </div>
                `;
            });

            document.getElementById('input-epoch').value = new Date(config.epoch).toISOString().slice(0, 16);
        }

        function updateConfig(key, val) {
            config[key] = Number(val);
            renderCalendar();
            updateDetails();
        }

        function switchTab(id) {
            ['clock', 'calendar', 'config'].forEach(t => {
                document.getElementById(`content-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).classList.remove('active');
            });
            document.getElementById(`content-${id}`).classList.remove('hidden');
            document.getElementById(`tab-${id}`).classList.add('active');
            
            if(id === 'calendar') renderCalendar();
        }

        function changeCalYear(delta) {
            viewYear += delta;
            renderCalendar();
        }

        // --- Boot ---
        window.onload = () => {
            const initial = getCustomTime(Date.now());
            viewYear = initial.year;
            selectedDay = initial.dayOfYear;
            
            initConfig();
            updateClock();
            updateDetails();
            setInterval(updateClock, 100);
        };
    </script>
</body>
</html>
