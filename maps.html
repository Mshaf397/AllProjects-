<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kindle Map Viewer</title>
    <!-- Load Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --ui-bg: #f0f0f0;
            --border-width: 2px;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Optimization for E-Ink: High Contrast & Grayscale */
        #map {
            height: 100%;
            width: 100%;
            background: #fff;
            filter: grayscale(100%) contrast(1.2);
        }

        /* Large Touch Targets for Kindle */
        .custom-controls {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            background: var(--ui-bg);
            border: var(--border-width) solid #000;
            color: #000;
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            min-width: 50px;
            cursor: pointer;
            box-shadow: 2px 2px 0px #000;
            text-decoration: none;
        }

        .btn:active {
            background: #000;
            color: #fff;
        }

        .search-bar {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1000;
            display: flex;
            width: calc(100% - 100px);
            max-width: 400px;
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 12px;
            border: var(--border-width) solid #000;
            font-size: 16px;
            outline: none;
        }

        .search-btn {
            background: #000;
            color: #fff;
            border: var(--border-width) solid #000;
            padding: 0 15px;
            font-weight: bold;
        }

        /* Time Display (24h) */
        #clock {
            position: absolute;
            bottom: 10px;
            left: 10px;
            z-index: 1000;
            background: rgba(255,255,255,0.8);
            padding: 5px 10px;
            border: 1px solid #000;
            font-size: 14px;
            font-weight: bold;
        }

        /* Leaflet Override for E-Ink visibility */
        .leaflet-control-zoom {
            display: none; /* We use custom large buttons */
        }
        
        .leaflet-container {
            background-color: #fff !important;
        }
    </style>
</head>
<body>

    <div class="search-bar">
        <input type="text" id="locationInput" placeholder="Search city or street...">
        <button class="search-btn" onclick="searchLocation()">Go</button>
    </div>

    <div class="custom-controls">
        <div class="btn" onclick="map.zoomIn()">+</div>
        <div class="btn" onclick="map.zoomOut()">−</div>
        <div class="btn" onclick="locateUser()">◎</div>
    </div>

    <div id="clock">00:00</div>

    <div id="map"></div>

    <!-- Load Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map;

        function initMap() {
            // Default to Mohegan Lake area as requested in context
            map = L.map('map', {
                zoomControl: false,
                tap: true // Better for mobile/Kindle browsers
            }).setView([41.3259, -73.8504], 13);

            // Use Voyager (labels-on-top) for better contrast, then filtered to grayscale
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap',
                maxZoom: 19
            }).addTo(map);

            updateTime();
            setInterval(updateTime, 60000);
        }

        function updateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}`;
        }

        async function searchLocation() {
            const query = document.getElementById('locationInput').value;
            if (!query) return;

            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
                const data = await response.json();
                if (data.length > 0) {
                    const { lat, lon } = data[0];
                    map.setView([lat, lon], 14);
                }
            } catch (e) {
                console.error("Search failed", e);
            }
        }

        function locateUser() {
            map.locate({setView: true, maxZoom: 16});
        }

        // Initialize on load
        window.onload = initMap;
        
        // Handle Kindle orientation changes
        window.onresize = () => {
            if(map) map.invalidateSize();
        };
    </script>
</body>
</html>
