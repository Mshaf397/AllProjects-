<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kindle Map Viewer</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --ui-bg: #f0f0f0;
            --border-width: 2px;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* E-Ink High Contrast Filter */
        #map {
            height: 100%;
            width: 100%;
            background: #fff;
            filter: grayscale(100%) contrast(1.4);
        }

        /* UI Containers */
        .search-container {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1001;
            width: calc(100% - 130px);
            max-width: 450px;
        }

        .search-bar {
            display: flex;
            box-shadow: 4px 4px 0px #000;
            background: #fff;
            border: var(--border-width) solid #000;
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 15px;
            border: none;
            font-size: 18px;
            outline: none;
            background: transparent;
            min-width: 0; /* Prevents flex items from overflowing */
        }

        /* Clear Button (X) */
        .clear-btn {
            background: transparent;
            border: none;
            font-size: 24px;
            font-weight: bold;
            padding: 0 15px;
            cursor: pointer;
            color: #666;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .clear-btn:active {
            background: #eee;
        }

        .search-btn {
            background: #000;
            color: #fff;
            border: none;
            border-left: var(--border-width) solid #000;
            padding: 0 20px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
        }

        /* Search Results List */
        #resultsList {
            display: none;
            background: #fff;
            border: var(--border-width) solid #000;
            border-top: none;
            max-height: 300px;
            overflow-y: auto;
            box-shadow: 4px 4px 0px #000;
        }

        .result-item {
            padding: 15px;
            border-bottom: 1px solid #ccc;
            font-size: 16px;
            cursor: pointer;
            color: #000;
        }

        .result-item:active {
            background-color: #000;
            color: #fff;
        }

        /* Large Touch Controls */
        .custom-controls {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            background: var(--ui-bg);
            border: var(--border-width) solid #000;
            color: #000;
            padding: 18px;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            min-width: 60px;
            cursor: pointer;
            box-shadow: 4px 4px 0px #000;
            text-decoration: none;
        }

        /* 24-hour Clock */
        #clock {
            position: absolute;
            bottom: 15px;
            left: 15px;
            z-index: 1000;
            background: #fff;
            padding: 8px 12px;
            border: 2px solid #000;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 3px 3px 0px #000;
        }

        /* Leaflet Scale Styling */
        .leaflet-control-scale-line {
            border: 2px solid #000 !important;
            border-top: none !important;
            background: #fff !important;
            color: #000 !important;
            font-weight: bold !important;
            font-size: 14px !important;
        }

        .leaflet-control-zoom {
            display: none;
        }
    </style>
</head>
<body>

    <div class="search-container">
        <div class="search-bar">
            <input type="text" id="locationInput" placeholder="Location...">
            <button class="clear-btn" onclick="clearSearch()" id="clearBtn">×</button>
            <button class="search-btn" onclick="searchLocation()">Go</button>
        </div>
        <div id="resultsList"></div>
    </div>

    <div class="custom-controls">
        <div class="btn" onclick="map.zoomIn()">+</div>
        <div class="btn" onclick="map.zoomOut()">−</div>
        <div class="btn" onclick="locateUser()">◎</div>
    </div>

    <div id="clock">00:00</div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map;

        function initMap() {
            // Default center: Mohegan Lake, NY
            map = L.map('map', {
                zoomControl: false,
                tap: true,
                attributionControl: false
            }).setView([41.3259, -73.8504], 14);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19
            }).addTo(map);

            L.control.scale({
                position: 'bottomright',
                imperial: true,
                metric: true
            }).addTo(map);

            updateTime();
            setInterval(updateTime, 60000);

            map.on('mousedown', () => {
                document.getElementById('resultsList').style.display = 'none';
            });
        }

        function updateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}`;
        }

        function clearSearch() {
            const input = document.getElementById('locationInput');
            input.value = '';
            input.focus();
            document.getElementById('resultsList').style.display = 'none';
        }

        async function searchLocation() {
            const query = document.getElementById('locationInput').value;
            const resultsDiv = document.getElementById('resultsList');
            
            if (!query) return;

            resultsDiv.innerHTML = '<div class="result-item">Searching...</div>';
            resultsDiv.style.display = 'block';

            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=5`);
                const data = await response.json();
                
                resultsDiv.innerHTML = '';
                
                if (data.length === 0) {
                    resultsDiv.innerHTML = '<div class="result-item">No results found.</div>';
                } else {
                    data.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'result-item';
                        div.textContent = item.display_name.split(',').slice(0, 3).join(',');
                        div.onclick = () => {
                            map.setView([item.lat, item.lon], 15);
                            resultsDiv.style.display = 'none';
                            document.getElementById('locationInput').value = div.textContent;
                        };
                        resultsDiv.appendChild(div);
                    });
                }
            } catch (e) {
                resultsDiv.innerHTML = '<div class="result-item">Error fetching data.</div>';
            }
        }

        function locateUser() {
            map.locate({setView: true, maxZoom: 16});
        }

        window.onload = initMap;
        window.onresize = () => { if(map) map.invalidateSize(); };
    </script>
</body>
</html>
