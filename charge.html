<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battery Drain Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0f172a',
                        darkCard: '#1e293b'
                    }
                }
            }
        }
    </script>
    <style>
        .glass-morphism {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px border rgba(255, 255, 255, 0.1);
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-darkBg text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-300">

    <div class="max-w-6xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-500 to-emerald-500 bg-clip-text text-transparent">
                    Battery Drain Lab
                </h1>
                <p class="text-slate-500 dark:text-slate-400 text-sm">Professional hardware testing logs</p>
            </div>
            <button id="themeToggle" class="p-2 rounded-lg bg-slate-200 dark:bg-slate-800 hover:ring-2 ring-blue-500 transition-all">
                <span class="dark:hidden">🌙 Dark Mode</span>
                <span class="hidden dark:inline">☀️ Light Mode</span>
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Form Section -->
            <section class="lg:col-span-1">
                <div class="bg-white dark:bg-darkCard p-6 rounded-2xl shadow-xl border border-slate-200 dark:border-slate-700">
                    <h2 class="text-xl font-semibold mb-6 flex items-center">
                        <span class="mr-2">📝</span> New Test Result
                    </h2>
                    
                    <form id="drainForm" class="space-y-4">
                        <div>
                            <label class="block text-xs font-medium uppercase tracking-wider mb-1 opacity-70">Device Name</label>
                            <input type="text" id="deviceName" required placeholder="e.g. iPhone 15 Pro" 
                                class="w-full p-2.5 rounded-lg bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 focus:ring-2 ring-blue-500 outline-none">
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-medium uppercase tracking-wider mb-1 opacity-70">Capacity (mAh)</label>
                                <input type="number" id="capacity" required placeholder="5000"
                                    class="w-full p-2.5 rounded-lg bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 focus:ring-2 ring-blue-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-xs font-medium uppercase tracking-wider mb-1 opacity-70">Drain (mAh/min)</label>
                                <input type="number" id="drainRate" step="0.000001" required placeholder="0.123456"
                                    class="w-full p-2.5 rounded-lg bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 focus:ring-2 ring-blue-500 outline-none">
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-medium uppercase tracking-wider mb-1 opacity-70">App Name</label>
                                <input type="text" id="appName" required placeholder="Camera"
                                    class="w-full p-2.5 rounded-lg bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 focus:ring-2 ring-blue-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-xs font-medium uppercase tracking-wider mb-1 opacity-70">Action</label>
                                <input type="text" id="appAction" required placeholder="4K Video"
                                    class="w-full p-2.5 rounded-lg bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 focus:ring-2 ring-blue-500 outline-none">
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-medium uppercase tracking-wider mb-1 opacity-70">Resolution (px)</label>
                                <input type="text" id="resolution" required placeholder="2556x1179"
                                    class="w-full p-2.5 rounded-lg bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 focus:ring-2 ring-blue-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-xs font-medium uppercase tracking-wider mb-1 opacity-70">Size (Inches)</label>
                                <input type="number" id="displaySize" step="0.1" required placeholder="6.1"
                                    class="w-full p-2.5 rounded-lg bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 focus:ring-2 ring-blue-500 outline-none">
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-medium uppercase tracking-wider mb-1 opacity-70">Brightness (Nits)</label>
                                <input type="number" id="brightness" required placeholder="1000"
                                    class="w-full p-2.5 rounded-lg bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 focus:ring-2 ring-blue-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-xs font-medium uppercase tracking-wider mb-1 opacity-70">Refresh (Hz)</label>
                                <input type="number" id="refreshRate" required placeholder="120"
                                    class="w-full p-2.5 rounded-lg bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 focus:ring-2 ring-blue-500 outline-none">
                            </div>
                        </div>

                        <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-colors mt-4 shadow-lg shadow-blue-500/20">
                            Save Record
                        </button>
                    </form>
                </div>
            </section>

            <!-- Results Section -->
            <section class="lg:col-span-2">
                <div class="bg-white dark:bg-darkCard rounded-2xl shadow-xl border border-slate-200 dark:border-slate-700 overflow-hidden">
                    <div class="p-6 border-b border-slate-200 dark:border-slate-700 flex justify-between items-center">
                        <h2 class="text-xl font-semibold">Test History</h2>
                        <span id="recordCount" class="text-xs font-mono bg-blue-100 dark:bg-blue-900/40 text-blue-600 px-2 py-1 rounded">0 Records</span>
                    </div>
                    
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-slate-50 dark:bg-slate-900/50 text-slate-500 dark:text-slate-400 text-xs uppercase tracking-widest">
                                    <th class="p-4 font-medium">Device & Specs</th>
                                    <th class="p-4 font-medium">Activity</th>
                                    <th class="p-4 font-medium text-right">Drain (mAh/min)</th>
                                    <th class="p-4 font-medium text-center">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="resultsTable" class="divide-y divide-slate-200 dark:divide-slate-700">
                                <!-- Data injected here -->
                            </tbody>
                        </table>
                    </div>
                    
                    <div id="loadingState" class="p-12 text-center text-slate-400">
                        <div class="animate-spin inline-block w-6 h-6 border-2 border-current border-t-transparent text-blue-600 rounded-full mb-2"></div>
                        <p>Syncing with database...</p>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Configuration from environment
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'battery-drain-tracker';
        
        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;

        // Theme Logic
        const themeToggle = document.getElementById('themeToggle');
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        themeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
        });

        // Authentication Logic
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth error:", error);
            }
        };

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                setupDataListener();
            }
        });

        initAuth();

        // Database Logic
        const setupDataListener = () => {
            const dataPath = collection(db, 'artifacts', appId, 'public', 'data', 'drain_tests');
            
            onSnapshot(dataPath, (snapshot) => {
                const tableBody = document.getElementById('resultsTable');
                const loadingState = document.getElementById('loadingState');
                const countBadge = document.getElementById('recordCount');
                
                loadingState.style.display = 'none';
                tableBody.innerHTML = '';
                countBadge.innerText = `${snapshot.size} Records`;

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const row = document.createElement('tr');
                    row.className = "hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors group";
                    
                    row.innerHTML = `
                        <td class="p-4">
                            <div class="font-bold text-blue-600 dark:text-blue-400">${data.deviceName}</div>
                            <div class="text-xs opacity-60">
                                ${data.capacity}mAh • ${data.displaySize}" • ${data.refreshRate}Hz • ${data.brightness} nits
                            </div>
                        </td>
                        <td class="p-4">
                            <div class="text-sm font-medium">${data.appName}</div>
                            <div class="text-xs text-slate-500">${data.appAction}</div>
                        </td>
                        <td class="p-4 text-right font-mono text-emerald-600 dark:text-emerald-400 font-semibold">
                            ${parseFloat(data.drainRate).toFixed(6)}
                        </td>
                        <td class="p-4 text-center">
                            <button onclick="window.deleteRecord('${doc.id}')" class="text-slate-400 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity">
                                🗑️
                            </button>
                        </td>
                    `;
                    tableBody.appendChild(row);
                });
            }, (error) => {
                console.error("Snapshot error:", error);
            });
        };

        // Global functions for UI
        window.deleteRecord = async (id) => {
            if (!currentUser) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'drain_tests', id);
                await deleteDoc(docRef);
            } catch (error) {
                console.error("Delete failed:", error);
            }
        };

        // Form Submission
        document.getElementById('drainForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser) {
                alert("Please wait for authentication to complete.");
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerText = "Saving...";

            const formData = {
                deviceName: document.getElementById('deviceName').value,
                capacity: parseInt(document.getElementById('capacity').value),
                appName: document.getElementById('appName').value,
                appAction: document.getElementById('appAction').value,
                drainRate: parseFloat(document.getElementById('drainRate').value),
                resolution: document.getElementById('resolution').value,
                displaySize: parseFloat(document.getElementById('displaySize').value),
                brightness: parseInt(document.getElementById('brightness').value),
                refreshRate: parseInt(document.getElementById('refreshRate').value),
                timestamp: serverTimestamp(),
                userId: currentUser.uid
            };

            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'drain_tests'), formData);
                document.getElementById('drainForm').reset();
            } catch (error) {
                console.error("Save error:", error);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "Save Record";
            }
        });

    </script>
</body>
</html>
