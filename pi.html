<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi EDO Mapper - Dynamic Root</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700;900&display=swap');
        
        body {
            background: #020617;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
        }
        .glass {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .note-active {
            background-color: #f59e0b !important;
            border-color: #fbbf24 !important;
            transform: scale(1.1);
            box-shadow: 0 0 25px rgba(245, 158, 11, 0.5);
            z-index: 30;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        input[type="number"] { -moz-appearance: textfield; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        select { cursor: pointer; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-8">

    <div class="max-w-6xl w-full glass rounded-[3rem] p-8 md:p-10 shadow-2xl relative">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-amber-500 via-orange-500 to-yellow-500"></div>
        
        <header class="flex flex-col md:flex-row justify-between items-end mb-8 gap-4">
            <div>
                <h1 class="text-4xl font-black tracking-tighter bg-clip-text text-transparent bg-gradient-to-br from-white to-slate-500 uppercase">
                    &pi; EDO DYNAMIC
                </h1>
                <p class="text-amber-500 font-mono text-xs tracking-tighter mt-1 uppercase italic">1-Centered Chain • Multi-EDO Rooting</p>
            </div>
            <div class="text-right hidden md:block">
                <div id="clock" class="text-xl font-black font-mono text-slate-200 tracking-widest">00:00:00</div>
                <div class="text-[9px] text-slate-500 font-bold uppercase tracking-[0.2em]">Mohegan Lake / 32°C System</div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
            <!-- 1. Tonal Basis -->
            <div class="space-y-4 bg-slate-900/50 p-5 rounded-3xl border border-white/5">
                <h2 class="text-[10px] font-black text-amber-400 uppercase tracking-[0.2em]">1. EDO System</h2>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase">Divisions</label>
                    <input type="number" id="edoVal" value="12" min="1" max="1200" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 focus:border-amber-500 outline-none transition-all font-mono text-white">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase">Root Step (Rel. C4)</label>
                    <select id="rootStep" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 outline-none focus:border-amber-500 transition-all font-mono text-sm text-white">
                        <!-- Populated by JS -->
                    </select>
                </div>
            </div>

            <!-- 2. Modal Map -->
            <div class="space-y-4 bg-slate-900/50 p-5 rounded-3xl border border-white/5">
                <h2 class="text-[10px] font-black text-emerald-400 uppercase tracking-[0.2em]">2. Chain Map</h2>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase">Scale Formula</label>
                    <select id="scaleType" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 outline-none focus:border-emerald-500 transition-all font-mono text-xs text-white">
                        <option value="0">Ionian (1 2 3 4 5 6 7)</option>
                        <option value="-1">Dorian (1 2 b3 4 5 6 b7)</option>
                        <option value="-2">Phrygian (1 b2 b3 4 5 b6 b7)</option>
                        <option value="1">Lydian (1 2 3 #4 5 6 7)</option>
                        <option value="-1">Mixolydian (1 2 3 4 5 6 b7)</option>
                        <option value="-3">Aeolian (1 2 b3 4 5 b6 b7)</option>
                        <option value="-4">Locrian (1 b2 b3 4 b5 b6 b7)</option>
                        <option value="2">Lydian #2 (1 #2 3 #4 5 6 7)</option>
                        <option value="-6">Ultralocrian (1 b2 b3 b4 b5 b6 bb7)</option>
                    </select>
                </div>
                <div class="text-[9px] text-slate-500 font-mono bg-black/40 p-2 rounded-lg">
                    Perfect 5th: <span id="fifthSteps" class="text-emerald-400">7</span> steps
                </div>
            </div>

            <!-- 3. Sequence Controls -->
            <div class="space-y-4 bg-slate-900/50 p-5 rounded-3xl border border-white/5 lg:col-span-2">
                <h2 class="text-[10px] font-black text-blue-400 uppercase tracking-[0.2em]">3. Data Stream</h2>
                <div class="grid grid-cols-3 gap-3">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase">Start</label>
                        <input type="number" id="startPos" value="0" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2 focus:border-blue-500 outline-none transition-all font-mono text-white text-sm">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase">Length</label>
                        <input type="number" id="lenPos" value="100" max="1000" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2 focus:border-blue-500 outline-none transition-all font-mono text-white text-sm">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase">BPM</label>
                        <input type="number" id="tempo" value="140" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2 focus:border-blue-500 outline-none transition-all font-mono text-white text-sm">
                    </div>
                </div>
                <div class="flex gap-3">
                    <button id="playBtn" class="flex-1 bg-white text-black font-black py-3 rounded-xl hover:bg-amber-400 transition-all active:scale-95 shadow-xl text-sm">
                        EXECUTE PLAYBACK
                    </button>
                    <button id="stopBtn" class="hidden px-5 py-3 bg-slate-800 rounded-xl font-bold uppercase text-[10px] tracking-widest text-slate-400 hover:text-red-400 transition-colors border border-slate-700">
                        Stop
                    </button>
                </div>
            </div>
        </div>

        <div id="visualizer" class="mt-6 custom-scrollbar flex flex-wrap content-start gap-1.5 p-6 bg-slate-950 rounded-[2rem] border border-slate-800 min-h-[250px] max-h-[400px] overflow-y-auto">
            <div class="w-full text-center text-slate-700 font-mono text-[10px] uppercase tracking-[0.4em] py-20">Awaiting Sequence</div>
        </div>
    </div>

    <footer class="mt-6 text-slate-600 text-[10px] font-mono tracking-widest uppercase flex flex-col items-center gap-2">
        <div class="flex gap-4 items-center">
            <span>24H TIME: <span id="sys-clock">00:00:00</span></span>
            <span class="w-1.5 h-1.5 rounded-full bg-slate-800"></span>
            <span>OPTIMAL AMBIENT: 32°C</span>
        </div>
    </footer>

    <script>
        const MIDDLE_C_FREQ = 261.63;
        
        const playBtn = document.getElementById('playBtn');
        const stopBtn = document.getElementById('stopBtn');
        const visualizer = document.getElementById('visualizer');
        const edoInput = document.getElementById('edoVal');
        const rootStepSelect = document.getElementById('rootStep');
        const fifthDisplay = document.getElementById('fifthSteps');
        const clockDisplay = document.getElementById('clock');
        const sysClock = document.getElementById('sys-clock');
        const scaleSelect = document.getElementById('scaleType');
        const startInput = document.getElementById('startPos');
        const lenInput = document.getElementById('lenPos');
        const tempoInput = document.getElementById('tempo');

        let audioCtx = null;
        let isPlaying = false;
        let playTimer = null;

        function updateClock() {
            const now = new Date().toLocaleTimeString('en-GB', { hour12: false });
            clockDisplay.textContent = now;
            sysClock.textContent = now;
        }
        setInterval(updateClock, 1000);
        updateClock();

        function populateRootSteps() {
            const edo = parseInt(edoInput.value) || 12;
            const currentVal = rootStepSelect.value;
            rootStepSelect.innerHTML = '';
            
            for (let i = 0; i < edo; i++) {
                const opt = document.createElement('option');
                opt.value = i;
                const cents = ((i / edo) * 1200).toFixed(1);
                opt.textContent = `Step ${i} (${cents}c)`;
                rootStepSelect.appendChild(opt);
            }
            
            if (currentVal < edo) rootStepSelect.value = currentVal || 0;
            
            const fifth = Math.round(edo * (701.955 / 1200));
            fifthDisplay.textContent = fifth;
        }

        edoInput.addEventListener('input', populateRootSteps);
        populateRootSteps();

        async function fetchPi(start, length) {
            try {
                const response = await fetch(`https://api.pi.delivery/v1/pi?start=${start}&numberOfDigits=${length}`);
                const data = await response.json();
                return data.content;
            } catch (e) { return "31415926535"; }
        }

        function getEDOStepsForScale() {
            const edo = parseInt(edoInput.value) || 12;
            const fifth = Math.round(edo * (701.955 / 1200));
            const modeShift = parseInt(scaleSelect.value);

            // Relative fifth indices for degrees 1 2 3 4 5 6 7
            const ionianFifths = [0, 2, 4, -1, 1, 3, 5];
            
            return ionianFifths.map(f => {
                const totalFifths = f + modeShift;
                let steps = (totalFifths * fifth) % edo;
                while (steps < 0) steps += edo;
                return steps;
            });
        }

        function triggerNote(freq, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.12, audioCtx.currentTime + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration - 0.01);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        async function startSystem() {
            if (isPlaying) return;
            const start = parseInt(startInput.value) || 0;
            const len = parseInt(lenInput.value) || 100;
            const edo = parseInt(edoInput.value) || 12;
            const rootStep = parseInt(rootStepSelect.value) || 0;
            
            // Dynamically calculate root frequency from Middle C + chosen EDO step
            const rootFreq = MIDDLE_C_FREQ * Math.pow(2, rootStep / edo);

            playBtn.disabled = true;
            playBtn.textContent = "FETCHING PI...";
            const piString = await fetchPi(start, len);
            const digits = piString.split('').map(Number);

            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            
            isPlaying = true;
            playBtn.textContent = "PLAYING";
            stopBtn.classList.remove('hidden');
            visualizer.innerHTML = '';

            const spans = digits.map(d => {
                const s = document.createElement('div');
                s.className = 'w-9 h-9 rounded-xl bg-slate-900 border border-slate-800 flex items-center justify-center font-mono font-bold text-xs text-slate-500 transition-all';
                s.textContent = d;
                visualizer.appendChild(s);
                return s;
            });

            const scaleSteps = getEDOStepsForScale();
            let step = 0;

            function playLoop() {
                if (!isPlaying || step >= digits.length) {
                    resetSystem();
                    return;
                }

                const bpm = parseInt(tempoInput.value) || 120;
                const duration = 60 / bpm;
                const digit = digits[step];
                
                let edoStep = 0;
                let octaveOffset = 0;

                // Digit Map:
                // 1-7: Scale Degrees
                // 8: Octave (1 + 1 oct)
                // 9: 2nd + 1 oct
                // 0: 3rd + 1 oct
                if (digit >= 1 && digit <= 7) {
                    edoStep = scaleSteps[digit - 1];
                } else if (digit === 8) {
                    edoStep = scaleSteps[0];
                    octaveOffset = 1;
                } else if (digit === 9) {
                    edoStep = scaleSteps[1];
                    octaveOffset = 1;
                } else if (digit === 0) {
                    edoStep = scaleSteps[2];
                    octaveOffset = 1;
                }

                const freq = rootFreq * Math.pow(2, octaveOffset + (edoStep / edo));

                spans.forEach(s => s.classList.remove('note-active', 'text-white'));
                spans[step].classList.add('note-active', 'text-white');
                spans[step].scrollIntoView({ behavior: 'smooth', block: 'nearest' });

                triggerNote(freq, duration);
                step++;
                playTimer = setTimeout(playLoop, duration * 1000);
            }
            playLoop();
        }

        function resetSystem() {
            isPlaying = false;
            clearTimeout(playTimer);
            playBtn.disabled = false;
            playBtn.textContent = "EXECUTE PLAYBACK";
            stopBtn.classList.add('hidden');
        }

        playBtn.addEventListener('click', startSystem);
        stopBtn.addEventListener('click', resetSystem);
    </script>
</body>
</html>
