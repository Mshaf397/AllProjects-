<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polynomial Root Finder (Real & Complex)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f0f4f8;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        .root-row:nth-child(even) { background-color: #f8fafc; }
        .complex-text { color: #8b5cf6; }
        .real-text { color: #059669; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight mb-2">Polynomial Root Finder</h1>
            <p class="text-slate-500 font-medium text-lg">Solving up to Degree 15 with Real & Imaginary Support</p>
            <div class="mt-2 text-xs text-slate-400">Current System Temp: 32°C | Time: <span id="clock"></span></div>
        </header>

        <div class="glass-card rounded-3xl shadow-xl overflow-hidden">
            <div class="p-6 md:p-10">
                <!-- Degree Selector -->
                <div class="flex flex-wrap items-center gap-6 mb-8 pb-8 border-b border-slate-100">
                    <div class="flex items-center gap-3">
                        <label class="font-bold text-slate-700">Polynomial Degree:</label>
                        <select id="degree-select" class="bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 font-bold text-blue-600 outline-none focus:ring-2 focus:ring-blue-400">
                            <!-- Options 1-15 generated by JS -->
                        </select>
                    </div>
                    <p class="text-sm text-slate-400 italic">Enter your coefficients below. Empty fields default to 0.</p>
                </div>

                <!-- Input Grid -->
                <div id="coeffs-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-8 gap-4 mb-10">
                    <!-- Dynamic Inputs -->
                </div>

                <div class="flex justify-center">
                    <button id="solve-btn" class="bg-slate-900 hover:bg-black text-white px-12 py-4 rounded-2xl font-bold text-xl shadow-2xl transform transition active:scale-95 flex items-center gap-3">
                        <span>Calculate Roots</span>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Results Display -->
        <div id="results-container" class="mt-8 hidden space-y-6">
            <div class="glass-card rounded-3xl p-6 md:p-8 shadow-lg">
                <h3 class="text-sm font-black text-slate-400 uppercase tracking-widest mb-4">Equation</h3>
                <div id="equation-display" class="text-2xl font-serif text-slate-800 break-words leading-relaxed"></div>
            </div>

            <div class="grid md:grid-cols-1 gap-6">
                <div class="glass-card rounded-3xl overflow-hidden shadow-lg border-t-4 border-blue-500">
                    <div class="p-6 bg-slate-50 border-b border-slate-100 flex justify-between items-center">
                        <h3 class="font-bold text-slate-800">Roots Found</h3>
                        <span class="px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-xs font-bold uppercase" id="root-count-badge"></span>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="text-xs text-slate-400 uppercase bg-slate-50/50">
                                <tr>
                                    <th class="px-6 py-4">#</th>
                                    <th class="px-6 py-4">Real Part</th>
                                    <th class="px-6 py-4">Imaginary Part</th>
                                    <th class="px-6 py-4">Standard Form ($a + bi$)</th>
                                </tr>
                            </thead>
                            <tbody id="roots-table-body" class="divide-y divide-slate-100 font-mono text-sm">
                                <!-- Roots will be injected here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Complex Number Class for math operations
        class Complex {
            constructor(re, im = 0) { this.re = re; this.im = im; }
            add(other) { return new Complex(this.re + other.re, this.im + other.im); }
            sub(other) { return new Complex(this.re - other.re, this.im - other.im); }
            mul(other) { return new Complex(this.re * other.re - this.im * other.im, this.re * other.im + this.im * other.re); }
            div(other) {
                let den = other.re * other.re + other.im * other.im;
                return new Complex((this.re * other.re + this.im * other.im) / den, (this.im * other.re - this.re * other.im) / den);
            }
            abs() { return Math.sqrt(this.re * this.re + this.im * this.im); }
        }

        const degreeSelect = document.getElementById('degree-select');
        const coeffsGrid = document.getElementById('coeffs-grid');
        const solveBtn = document.getElementById('solve-btn');
        const resultsContainer = document.getElementById('results-container');
        const clockSpan = document.getElementById('clock');

        // Setup 24h Clock
        function updateClock() {
            const now = new Date();
            clockSpan.textContent = now.toLocaleTimeString('en-GB', { hour12: false });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Initialize Degree Selector
        for (let i = 1; i <= 15; i++) {
            const opt = document.createElement('option');
            opt.value = i;
            opt.textContent = i;
            if (i === 2) opt.selected = true;
            degreeSelect.appendChild(opt);
        }

        function renderInputs() {
            const n = parseInt(degreeSelect.value);
            coeffsGrid.innerHTML = '';
            for (let i = n; i >= 0; i--) {
                const container = document.createElement('div');
                container.className = 'flex flex-col gap-1';
                container.innerHTML = `
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-tighter">x<sup>${i}</sup></label>
                    <input type="number" step="any" data-power="${i}" placeholder="0" 
                           class="coeff-input w-full bg-white border border-slate-200 rounded-xl px-3 py-3 text-center font-bold text-slate-700 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition-all">
                `;
                coeffsGrid.appendChild(container);
            }
        }

        degreeSelect.addEventListener('change', renderInputs);
        renderInputs();

        function evaluateComplexPoly(coeffs, z) {
            let res = new Complex(0, 0);
            for (let i = 0; i < coeffs.length; i++) {
                let term = new Complex(coeffs[i], 0);
                // Compute z^i
                let p = new Complex(1, 0);
                for (let j = 0; j < i; j++) p = p.mul(z);
                res = res.add(term.mul(p));
            }
            return res;
        }

        // Durand-Kerner Algorithm
        function solveRoots(coeffs) {
            const n = coeffs.length - 1;
            // Normalize so leading coefficient is 1
            const an = coeffs[n];
            const normalized = coeffs.map(c => c / an);
            
            // Initial guesses: spread them around the unit circle in complex plane
            let roots = [];
            for (let i = 0; i < n; i++) {
                let radius = 1.0 + i * 0.1; // Slight variation to avoid symmetry
                let angle = (2 * Math.PI * i) / n + 0.5; // Offset to break symmetry
                roots.push(new Complex(Math.pow(radius, i) * Math.cos(angle), Math.pow(radius, i) * Math.sin(angle)));
            }

            // Iterate
            for (let iter = 0; iter < 200; iter++) {
                let maxDiff = 0;
                let newRoots = [];
                for (let i = 0; i < n; i++) {
                    let fz = evaluateComplexPoly(normalized, roots[i]);
                    let denominator = new Complex(1, 0);
                    for (let j = 0; j < n; j++) {
                        if (i === j) continue;
                        denominator = denominator.mul(roots[i].sub(roots[j]));
                    }
                    let delta = fz.div(denominator);
                    let nextRoot = roots[i].sub(delta);
                    newRoots.push(nextRoot);
                    maxDiff = Math.max(maxDiff, delta.abs());
                }
                roots = newRoots;
                if (maxDiff < 1e-12) break;
            }
            return roots;
        }

        solveBtn.addEventListener('click', () => {
            const inputs = document.querySelectorAll('.coeff-input');
            const n = parseInt(degreeSelect.value);
            let coeffs = new Array(n + 1).fill(0);
            
            inputs.forEach(input => {
                coeffs[parseInt(input.dataset.power)] = parseFloat(input.value) || 0;
            });

            // Clean leading zeros
            while (coeffs.length > 1 && coeffs[coeffs.length - 1] === 0) coeffs.pop();
            const actualDegree = coeffs.length - 1;

            if (actualDegree < 1) return;

            // Update Equation Display
            let eqParts = [];
            for (let i = actualDegree; i >= 0; i--) {
                let c = coeffs[i];
                if (c === 0) continue;
                let sign = c > 0 ? (i === actualDegree ? "" : "+ ") : "- ";
                let absC = Math.abs(c);
                let val = (absC === 1 && i > 0) ? "" : absC;
                let x = i === 0 ? "" : (i === 1 ? "x" : `x<sup>${i}</sup>`);
                eqParts.push(`${sign}${val}${x}`);
            }
            document.getElementById('equation-display').innerHTML = eqParts.join(' ') + " = 0";

            // Solve
            const roots = solveRoots(coeffs);
            
            // Render Table
            const tbody = document.getElementById('roots-table-body');
            tbody.innerHTML = '';
            
            roots.sort((a, b) => a.re - b.re); // Basic sort for stability

            roots.forEach((root, idx) => {
                // Rounding for display
                const re = Math.abs(root.re) < 1e-10 ? 0 : root.re;
                const im = Math.abs(root.im) < 1e-10 ? 0 : root.im;

                const row = document.createElement('tr');
                row.className = 'root-row group hover:bg-blue-50/50 transition-colors';
                
                const standardForm = im === 0 ? 
                    `<span class="real-text font-bold">${re.toFixed(6)}</span>` : 
                    `${re.toFixed(6)} ${im > 0 ? '+' : '-'} <span class="complex-text font-bold">${Math.abs(im).toFixed(6)}i</span>`;

                row.innerHTML = `
                    <td class="px-6 py-4 text-slate-300 font-bold">${idx + 1}</td>
                    <td class="px-6 py-4 text-slate-600">${re.toFixed(8)}</td>
                    <td class="px-6 py-4 text-slate-600">${im.toFixed(8)}</td>
                    <td class="px-6 py-4">${standardForm}</td>
                `;
                tbody.appendChild(row);
            });

            document.getElementById('root-count-badge').textContent = `${roots.length} Solutions`;
            resultsContainer.classList.remove('hidden');
            resultsContainer.scrollIntoView({ behavior: 'smooth' });
        });
    </script>
</body>
</html>
