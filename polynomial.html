<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Degree Polynomial Solver</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0f172a; 
            color: #f1f5f9; 
        }
        
        /* Arial override for output sections */
        .arial-output { 
            font-family: Arial, Helvetica, sans-serif !important; 
        }
        
        .glass { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255,255,255,0.1); 
        }
        
        input::-webkit-outer-spin-button, 
        input::-webkit-inner-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        
        .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-10">

    <div class="max-w-5xl w-full space-y-6">
        <header class="text-center space-y-2">
            <h1 class="text-4xl font-bold tracking-tight text-blue-400">Polynomial Solver Pro</h1>
            <p class="text-slate-400">Advanced root finding for degrees up to 25</p>
        </header>

        <div class="glass rounded-3xl p-6 md:p-8 shadow-2xl">
            <div class="flex flex-col md:flex-row gap-6 items-end mb-8">
                <div class="w-full md:w-1/3">
                    <label class="block text-sm font-medium text-slate-400 mb-2 uppercase tracking-wider">Polynomial Degree</label>
                    <select id="degreeSelect" onchange="generateInputs()" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all cursor-pointer">
                        <!-- Generated by JS -->
                    </select>
                </div>
                <button onclick="calculate()" class="w-full md:w-2/3 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-6 rounded-xl shadow-lg shadow-blue-900/20 transition-all active:scale-[0.98]">
                    Calculate Roots & Factors
                </button>
            </div>

            <div id="coeffInputs" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4 mb-8">
                <!-- Dynamic inputs injected here -->
            </div>

            <div id="errorDisplay" class="hidden p-4 mb-6 bg-red-900/30 border border-red-500/50 text-red-200 rounded-xl text-sm"></div>

            <!-- Output Section in Arial -->
            <div id="results" class="hidden space-y-8 animate-in fade-in duration-500 arial-output">
                <section>
                    <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-3" style="font-family: 'Inter', sans-serif;">Factored Expression</h3>
                    <div id="factorOutput" class="p-5 bg-slate-900/50 border border-slate-800 rounded-2xl text-blue-300 text-lg break-all leading-relaxed"></div>
                </section>

                <section>
                    <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-3" style="font-family: 'Inter', sans-serif;">Calculated Roots</h3>
                    <div id="rootsContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3"></div>
                </section>
            </div>
        </div>

        <footer class="flex justify-between items-center px-4 text-xs font-medium text-slate-500">
            <div class="flex items-center gap-4">
                <span id="clock" class="mono">00:00:00</span>
            </div>
            <span>Degree Max: 25 | Arial Output Mode</span>
        </footer>
    </div>

    <script>
        // Populate Degree Dropdown
        const degreeSelect = document.getElementById('degreeSelect');
        for (let i = 1; i <= 25; i++) {
            const opt = document.createElement('option');
            opt.value = i;
            opt.innerText = `Degree ${i}` + (i === 2 ? ' (Quadratic)' : i === 3 ? ' (Cubic)' : '');
            if (i === 2) opt.selected = true;
            degreeSelect.appendChild(opt);
        }

        class Complex {
            constructor(re, im = 0) { this.re = re; this.im = im; }
            add(c) { return new Complex(this.re + c.re, this.im + c.im); }
            sub(c) { return new Complex(this.re - c.re, this.im - c.im); }
            mul(c) { return new Complex(this.re * c.re - this.im * c.im, this.re * c.im + this.im * c.re); }
            div(c) {
                const d = c.re * c.re + c.im * c.im;
                if (d === 0) return new Complex(0, 0);
                return new Complex((this.re * c.re + this.im * c.im) / d, (this.im * c.re - this.re * c.im) / d);
            }
            abs() { return Math.sqrt(this.re * this.re + this.im * this.im); }
            format() {
                const r = Number(this.re.toFixed(6));
                const i = Number(this.im.toFixed(6));
                if (Math.abs(i) < 1e-10) return r.toString();
                if (Math.abs(r) < 1e-10) return i + "i";
                return `${r} ${i > 0 ? '+' : '-'} ${Math.abs(i)}i`;
            }
        }

        function generateInputs() {
            const degree = parseInt(degreeSelect.value);
            const container = document.getElementById('coeffInputs');
            container.innerHTML = '';

            for (let i = degree; i >= 0; i--) {
                const div = document.createElement('div');
                div.className = "space-y-1";
                const label = i > 1 ? `x<sup>${i}</sup>` : (i === 1 ? 'x' : 'const');
                div.innerHTML = `
                    <label class="block text-[10px] font-bold text-slate-500 uppercase ml-1">${label}</label>
                    <input type="number" step="any" id="c_${i}" placeholder="0" 
                    class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 mono focus:ring-1 focus:ring-blue-500 outline-none transition-all">
                `;
                container.appendChild(div);
            }
        }

        function polyEval(coeffs, x) {
            let res = new Complex(0, 0);
            for (let i = 0; i < coeffs.length; i++) {
                let term = new Complex(coeffs[i], 0);
                let p = coeffs.length - 1 - i;
                let xP = new Complex(1, 0);
                // Use power rule for stability in higher degrees
                for (let j = 0; j < p; j++) xP = xP.mul(x);
                res = res.add(term.mul(xP));
            }
            return res;
        }

        function calculate() {
            const degree = parseInt(degreeSelect.value);
            const errorDiv = document.getElementById('errorDisplay');
            const resultsDiv = document.getElementById('results');
            
            try {
                let coeffs = [];
                for (let i = degree; i >= 0; i--) {
                    const val = document.getElementById(`c_${i}`).value;
                    coeffs.push(val === "" ? 0 : parseFloat(val));
                }

                if (coeffs[0] === 0) throw new Error("Leading coefficient cannot be zero.");

                // Durand-Kerner Root Finding (Optimized for higher degrees)
                const n = degree;
                const norm = coeffs.map(c => c / coeffs[0]);
                let roots = [];
                
                // Initialize roots with slightly asymmetric distribution to prevent convergence stalling
                for (let i = 0; i < n; i++) {
                    const radius = 1.0 + (i * 0.01); 
                    const angle = (2 * Math.PI * i) / n + 0.3;
                    roots.push(new Complex(radius * Math.cos(angle), radius * Math.sin(angle)));
                }

                // Increase iterations for higher degree polynomials
                const maxIters = 800;
                for (let iter = 0; iter < maxIters; iter++) {
                    let maxDelta = 0;
                    for (let i = 0; i < n; i++) {
                        let num = polyEval(norm, roots[i]);
                        let den = new Complex(1, 0);
                        for (let j = 0; j < n; j++) {
                            if (i === j) continue;
                            den = den.mul(roots[i].sub(roots[j]));
                        }
                        let delta = num.div(den);
                        roots[i] = roots[i].sub(delta);
                        maxDelta = Math.max(maxDelta, delta.abs());
                    }
                    if (maxDelta < 1e-13) break;
                }

                // Factored Output (Arial)
                let lc = coeffs[0];
                let factorStr = (lc === 1) ? "" : (lc === -1 ? "-" : lc);
                roots.forEach(r => {
                    const re = -r.re;
                    const im = -r.im;
                    const reF = Math.abs(re).toFixed(4);
                    const imF = Math.abs(im).toFixed(4);
                    
                    if (Math.abs(im) < 1e-6) {
                        factorStr += `(x ${re >= 0 ? '+' : '-'} ${reF})`;
                    } else {
                        factorStr += `(x ${re >= 0 ? '+' : '-'} ${reF} ${im >= 0 ? '-' : '+'} ${imF}i)`;
                    }
                });
                document.getElementById('factorOutput').innerText = factorStr;

                // Roots UI (Arial)
                const container = document.getElementById('rootsContainer');
                container.innerHTML = '';
                roots.forEach((r, i) => {
                    const div = document.createElement('div');
                    div.className = "bg-slate-800/50 p-4 rounded-xl border border-slate-700 flex justify-between items-center";
                    div.innerHTML = `
                        <span style="font-family: 'Inter', sans-serif;" class="text-slate-500 font-bold text-[10px]">#${i+1}</span> 
                        <span class="text-blue-400 font-bold text-sm">${r.format()}</span>
                    `;
                    container.appendChild(div);
                });

                errorDiv.classList.add('hidden');
                resultsDiv.classList.remove('hidden');
            } catch (e) {
                errorDiv.innerText = "Error: " + e.message;
                errorDiv.classList.remove('hidden');
                resultsDiv.classList.add('hidden');
            }
        }

        function tick() {
            const now = new Date();
            // 24-hour time format
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB', { hour12: false });
        }
        setInterval(tick, 1000);
        tick();
        generateInputs();
    </script>
</body>
</html>
