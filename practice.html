<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Resolution Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f1f5f9;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .canvas-container {
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            background-image: 
                linear-gradient(45deg, #1e293b 25%, transparent 25%), 
                linear-gradient(-45deg, #1e293b 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #1e293b 75%), 
                linear-gradient(-45deg, transparent 75%, #1e293b 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
        input[type="number"], input[type="text"] {
            background: #1e293b;
            border: 1px solid #334155;
            color: white;
            padding: 0.5rem;
            border-radius: 0.375rem;
        }
        .control-panel {
            scrollbar-width: thin;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col md:flex-row">

    <!-- Sidebar Controls -->
    <aside class="w-full md:w-80 p-6 bg-slate-900 border-r border-slate-800 control-panel overflow-y-auto max-h-screen">
        <h1 class="text-2xl font-bold mb-6 text-blue-400">ResSim <span class="text-xs font-normal text-slate-500">v1.0</span></h1>
        
        <div class="space-y-6">
            <!-- Step 1: Physical Size -->
            <section>
                <label class="block text-sm font-medium text-slate-400 mb-2">1. Physical Dimensions (Inches)</label>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <span class="text-xs text-slate-500">Width</span>
                        <input type="number" id="phys-w" value="6.1" step="0.1" class="w-full">
                    </div>
                    <div>
                        <span class="text-xs text-slate-500">Height</span>
                        <input type="number" id="phys-h" value="3.0" step="0.1" class="w-full">
                    </div>
                </div>
            </section>

            <!-- Step 2: Resolution -->
            <section>
                <label class="block text-sm font-medium text-slate-400 mb-2">2. Screen Resolution (Pixels)</label>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <span class="text-xs text-slate-500">Pixels W</span>
                        <input type="number" id="res-w" value="1170" class="w-full">
                    </div>
                    <div>
                        <span class="text-xs text-slate-500">Pixels H</span>
                        <input type="number" id="res-h" value="2532" class="w-full">
                    </div>
                </div>
                <div class="mt-2 text-xs text-blue-300" id="ppi-display">Calculated PPI: 0</div>
            </section>

            <!-- Step 3: Media -->
            <section>
                <label class="block text-sm font-medium text-slate-400 mb-2">3. Load Image</label>
                <div class="space-y-2">
                    <button onclick="document.getElementById('file-input').click()" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-2 rounded transition">
                        Upload Image
                    </button>
                    <button onclick="startCamera()" class="w-full bg-slate-700 hover:bg-slate-600 text-white py-2 rounded transition">
                        Take Photo
                    </button>
                    <input type="file" id="file-input" class="hidden" accept="image/*">
                </div>
            </section>

            <!-- Calibration -->
            <section class="p-4 bg-slate-800 rounded-lg">
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Screen Calibration</label>
                <p class="text-[10px] text-slate-500 mb-2">Adjust zoom until the red line below is exactly 1 inch on your real screen.</p>
                <input type="range" id="zoom-slider" min="50" max="200" value="96" class="w-full mb-2">
                <div id="inch-ruler" class="h-1 bg-red-500 w-[96px] mx-auto"></div>
            </section>

            <div class="pt-4 border-t border-slate-800">
                <p class="text-[10px] text-slate-600 italic">
                    Note: This simulates the visual clarity by downsampling your image to the target resolution and upscaling it back to the physical area.
                </p>
            </div>
        </div>
    </aside>

    <!-- Main Display Area -->
    <main class="flex-1 flex items-center justify-center p-4 md:p-10 relative overflow-hidden">
        <div id="sim-container" class="canvas-container relative flex items-center justify-center transition-all duration-300">
            <canvas id="display-canvas" class="max-w-full max-h-full"></canvas>
            
            <!-- Metadata Overlay -->
            <div class="absolute -bottom-10 left-0 right-0 flex justify-between text-[10px] text-slate-500 uppercase tracking-widest">
                <span id="label-dims">0" x 0"</span>
                <span id="label-res">0 x 0 PX</span>
            </div>
        </div>

        <!-- Camera Modal -->
        <div id="camera-modal" class="hidden fixed inset-0 bg-black/90 z-50 flex flex-col items-center justify-center">
            <video id="video" class="max-w-full h-auto" autoplay playsinline></video>
            <div class="mt-4 space-x-4">
                <button onclick="capturePhoto()" class="bg-blue-600 px-6 py-2 rounded-full font-bold">CAPTURE</button>
                <button onclick="stopCamera()" class="bg-red-600 px-6 py-2 rounded-full font-bold">CANCEL</button>
            </div>
        </div>
    </main>

    <script>
        const canvas = document.getElementById('display-canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const fileInput = document.getElementById('file-input');
        const zoomSlider = document.getElementById('zoom-slider');
        const inchRuler = document.getElementById('inch-ruler');
        
        let sourceImage = new Image();
        sourceImage.src = 'https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&w=1200&q=80'; // Default landscape

        const state = {
            physW: 6.1,
            physH: 3.0,
            resW: 1170,
            resH: 2532,
            screenPPI: 96 // Default browser standard
        };

        function updateState() {
            state.physW = parseFloat(document.getElementById('phys-w').value) || 1;
            state.physH = parseFloat(document.getElementById('phys-h').value) || 1;
            state.resW = parseInt(document.getElementById('res-w').value) || 1;
            state.resH = parseInt(document.getElementById('res-h').value) || 1;
            state.screenPPI = parseInt(zoomSlider.value);

            // Update Labels
            document.getElementById('label-dims').textContent = `${state.physW}" x ${state.physH}"`;
            document.getElementById('label-res').textContent = `${state.resW} x ${state.resH} PX`;
            
            const diagonalIn = Math.sqrt(state.physW**2 + state.physH**2);
            const diagonalPx = Math.sqrt(state.resW**2 + state.resH**2);
            const ppi = (diagonalPx / diagonalIn).toFixed(1);
            document.getElementById('ppi-display').textContent = `Calculated PPI: ${ppi}`;

            render();
        }

        function render() {
            // 1. Calculate the physical size in "Browser Pixels" (CSS pixels)
            const cssW = state.physW * state.screenPPI;
            const cssH = state.physH * state.screenPPI;

            // Update canvas element dimensions (CSS)
            canvas.style.width = `${cssW}px`;
            canvas.style.height = `${cssH}px`;

            // 2. Set the canvas internal resolution to the TARGET simulated resolution
            // This is the "simulated" screen grid
            canvas.width = state.resW;
            canvas.height = state.resH;

            // Turn off smoothing to see the actual pixel grid if we were zoomed in
            ctx.imageSmoothingEnabled = true; // Use true to simulate how light spreads, false for raw pixel blocks
            
            if (sourceImage.complete) {
                // Draw image to fill the canvas resolution
                const scale = Math.max(canvas.width / sourceImage.width, canvas.height / sourceImage.height);
                const x = (canvas.width / 2) - (sourceImage.width / 2) * scale;
                const y = (canvas.height / 2) - (sourceImage.height / 2) * scale;
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(sourceImage, x, y, sourceImage.width * scale, sourceImage.height * scale);
            }
        }

        // Handle File Uploads
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                sourceImage = new Image();
                sourceImage.onload = render;
                sourceImage.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // Camera Logic
        let stream = null;
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                document.getElementById('video').srcObject = stream;
                document.getElementById('camera-modal').classList.remove('hidden');
            } catch (err) {
                console.error("Camera access denied", err);
                alert("Camera access denied or unavailable.");
            }
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            document.getElementById('camera-modal').classList.add('hidden');
        }

        function capturePhoto() {
            const video = document.getElementById('video');
            const offscreen = document.createElement('canvas');
            offscreen.width = video.videoWidth;
            offscreen.height = video.videoHeight;
            offscreen.getContext('2d').drawImage(video, 0, 0);
            
            sourceImage = new Image();
            sourceImage.onload = () => {
                render();
                stopCamera();
            };
            sourceImage.src = offscreen.toDataURL('image/png');
        }

        // Event Listeners for inputs
        ['phys-w', 'phys-h', 'res-w', 'res-h'].forEach(id => {
            document.getElementById(id).addEventListener('input', updateState);
        });

        zoomSlider.addEventListener('input', (e) => {
            inchRuler.style.width = `${e.target.value}px`;
            updateState();
        });

        // Initial render
        window.onload = () => {
            sourceImage.onload = updateState;
            updateState();
        };

        // Responsive handling
        window.addEventListener('resize', updateState);
    </script>
</body>
</html>
