<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmonic Timbre Synthesizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f1f5f9;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .slider-thumb::-webkit-slider-thumb {
            appearance: none;
            width: 18px;
            height: 18px;
            background: #3b82f6;
            cursor: pointer;
            border-radius: 50%;
        }
        .canvas-container {
            background: rgba(30, 41, 59, 0.5);
            border-radius: 12px;
            border: 1px solid #334155;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-blue-400">Timbre Synthesizer</h1>
            <p class="text-slate-400">Explore how overtones define the "color" of a sound.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Controls Column -->
            <div class="lg:col-span-1 space-y-6">
                <section class="bg-slate-800 p-6 rounded-xl border border-slate-700">
                    <h2 class="text-xl font-semibold mb-4 flex items-center">
                        <svg class="w-5 h-5 mr-2 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path></svg>
                        Global
                    </h2>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium mb-1">Fundamental Freq (Hz)</label>
                            <input type="number" id="baseFreq" value="220" class="w-full bg-slate-900 border border-slate-600 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium mb-1">Master Volume</label>
                            <input type="range" id="masterVol" min="0" max="1" step="0.01" value="0.5" class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer slider-thumb">
                        </div>

                        <div class="pt-4 flex gap-2">
                            <button id="playBtn" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition-colors">START</button>
                            <button id="stopBtn" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 rounded-lg transition-colors">STOP</button>
                        </div>
                    </div>
                </section>

                <section class="bg-slate-800 p-6 rounded-xl border border-slate-700">
                    <h2 class="text-xl font-semibold mb-4">Presets</h2>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="applyPreset('sine')" class="text-xs bg-slate-700 p-2 rounded hover:bg-slate-600">Pure Sine</button>
                        <button onclick="applyPreset('square')" class="text-xs bg-slate-700 p-2 rounded hover:bg-slate-600">Hollow Square</button>
                        <button onclick="applyPreset('saw')" class="text-xs bg-slate-700 p-2 rounded hover:bg-slate-600">Bright Saw</button>
                        <button onclick="applyPreset('nigun')" class="text-xs bg-blue-900/40 border border-blue-500/30 p-2 rounded hover:bg-blue-800/40 text-blue-200">Nigun Spirit</button>
                    </div>
                </section>
            </div>

            <!-- Overtones Column -->
            <div class="lg:col-span-2 space-y-6">
                <div class="canvas-container p-4">
                    <canvas id="visualizer" class="w-full h-32 rounded bg-black/20"></canvas>
                </div>

                <div class="bg-slate-800 p-6 rounded-xl border border-slate-700">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-semibold">Harmonic Overtones</h2>
                        <button id="addOvertone" class="text-sm bg-blue-600 hover:bg-blue-500 px-3 py-1 rounded-full">+ Add Harmonic</button>
                    </div>
                    
                    <div id="overtoneList" class="space-y-4 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                        <!-- Overtones injected here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let audioCtx;
        let masterGain;
        let oscillators = [];
        let analyzer;
        let isPlaying = false;

        const baseFreqInput = document.getElementById('baseFreq');
        const masterVolInput = document.getElementById('masterVol');
        const overtoneList = document.getElementById('overtoneList');
        const playBtn = document.getElementById('playBtn');
        const stopBtn = document.getElementById('stopBtn');
        const canvas = document.getElementById('visualizer');
        const canvasCtx = canvas.getContext('2d');

        // Initial Data Structure
        let overtones = [
            { ratio: 1, volume: 1 },
            { ratio: 2, volume: 0.5 },
            { ratio: 3, volume: 0.33 }
        ];

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = audioCtx.createGain();
                analyzer = audioCtx.createAnalyser();
                analyzer.fftSize = 2048;
                masterGain.connect(analyzer);
                analyzer.connect(audioCtx.destination);
                masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
            }
        }

        function createOvertoneUI(ov, index) {
            const div = document.createElement('div');
            div.className = "flex flex-col md:flex-row items-center gap-4 bg-slate-900/50 p-4 rounded-lg border border-slate-700 relative group";
            div.innerHTML = `
                <div class="flex-1 w-full">
                    <label class="text-[10px] uppercase text-slate-500 block mb-1">Ratio (x Fund.)</label>
                    <input type="number" step="0.01" value="${ov.ratio}" 
                        onchange="updateOvertone(${index}, 'ratio', this.value)"
                        class="w-full bg-slate-800 border border-slate-600 rounded px-2 py-1 text-sm outline-none focus:border-blue-500">
                </div>
                <div class="flex-[2] w-full">
                    <label class="text-[10px] uppercase text-slate-500 block mb-1">Amplitude (${Math.round(ov.volume * 100)}%)</label>
                    <input type="range" min="0" max="1" step="0.01" value="${ov.volume}" 
                        oninput="updateOvertone(${index}, 'volume', this.value)"
                        class="w-full h-1.5 bg-slate-700 rounded-lg appearance-none cursor-pointer slider-thumb">
                </div>
                <button onclick="removeOvertone(${index})" class="text-slate-500 hover:text-red-400 p-1">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            `;
            return div;
        }

        function renderOvertones() {
            overtoneList.innerHTML = '';
            overtones.forEach((ov, i) => {
                overtoneList.appendChild(createOvertoneUI(ov, i));
            });
            if (isPlaying) restartOscillators();
        }

        function updateOvertone(index, key, value) {
            overtones[index][key] = parseFloat(value);
            if (isPlaying) restartOscillators();
            if (key === 'volume') renderOvertones(); // Refresh labels
        }

        function removeOvertone(index) {
            overtones.splice(index, 1);
            renderOvertones();
        }

        document.getElementById('addOvertone').onclick = () => {
            const lastRatio = overtones.length > 0 ? overtones[overtones.length - 1].ratio : 0;
            overtones.push({ ratio: Math.floor(lastRatio + 1), volume: 0.2 });
            renderOvertones();
        };

        function restartOscillators() {
            if (!audioCtx) return;
            
            oscillators.forEach(o => {
                try { o.osc.stop(); o.osc.disconnect(); } catch(e) {}
            });
            oscillators = [];

            const now = audioCtx.currentTime;
            const base = parseFloat(baseFreqInput.value);

            overtones.forEach(ov => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(base * ov.ratio, now);
                
                gain.gain.setValueAtTime(ov.volume, now);
                
                osc.connect(gain);
                gain.connect(masterGain);
                
                osc.start();
                oscillators.push({ osc, gain });
            });
        }

        playBtn.onclick = async () => {
            if (audioCtx && audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }
            initAudio();
            isPlaying = true;
            restartOscillators();
            masterGain.gain.setTargetAtTime(masterVolInput.value, audioCtx.currentTime, 0.05);
            playBtn.classList.add('bg-green-600');
            draw();
        };

        stopBtn.onclick = () => {
            if (!masterGain) return;
            masterGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05);
            setTimeout(() => {
                oscillators.forEach(o => o.osc.stop());
                isPlaying = false;
                playBtn.classList.remove('bg-green-600');
            }, 100);
        };

        masterVolInput.oninput = (e) => {
            if (masterGain) {
                masterGain.gain.setTargetAtTime(e.target.value, audioCtx.currentTime, 0.02);
            }
        };

        baseFreqInput.onchange = () => {
            if (isPlaying) restartOscillators();
        };

        function applyPreset(type) {
            if (type === 'sine') {
                overtones = [{ ratio: 1, volume: 1 }];
            } else if (type === 'square') {
                overtones = [
                    { ratio: 1, volume: 1 },
                    { ratio: 3, volume: 0.33 },
                    { ratio: 5, volume: 0.2 },
                    { ratio: 7, volume: 0.14 },
                    { ratio: 9, volume: 0.11 }
                ];
            } else if (type === 'saw') {
                overtones = [];
                for(let i=1; i<=10; i++) overtones.push({ ratio: i, volume: 1/i });
            } else if (type === 'nigun') {
                // Warm, slightly complex harmonic series typical of reed/string instruments
                overtones = [
                    { ratio: 1, volume: 1 },
                    { ratio: 2, volume: 0.6 },
                    { ratio: 3, volume: 0.4 },
                    { ratio: 4, volume: 0.1 },
                    { ratio: 5, volume: 0.15 },
                    { ratio: 6, volume: 0.05 }
                ];
                baseFreqInput.value = 146.83; // D3, a common warm starting point
            }
            renderOvertones();
        }

        function draw() {
            if (!isPlaying) return;
            requestAnimationFrame(draw);
            
            const bufferLength = analyzer.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyzer.getByteTimeDomainData(dataArray);

            canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
            canvasCtx.lineWidth = 2;
            canvasCtx.strokeStyle = '#3b82f6';
            canvasCtx.beginPath();

            const sliceWidth = canvas.width * 1.0 / bufferLength;
            let x = 0;

            for (let i = 0; i < bufferLength; i++) {
                const v = dataArray[i] / 128.0;
                const y = v * canvas.height / 2;

                if (i === 0) canvasCtx.moveTo(x, y);
                else canvasCtx.lineTo(x, y);

                x += sliceWidth;
            }

            canvasCtx.lineTo(canvas.width, canvas.height / 2);
            canvasCtx.stroke();
        }

        // Initialize UI
        renderOvertones();

        // Responsive canvas
        function resize() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = 128;
        }
        window.addEventListener('resize', resize);
        resize();

    </script>
</body>
</html>
