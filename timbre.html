<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Timbre Designer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; touch-action: manipulation; }
        .knob-input { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 8px; width: 100%; text-align: center; font-size: 0.9rem; color: white; }
        input[type="checkbox"] { width: 24px; height: 24px; accent-color: #3b82f6; cursor: pointer; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 16px; }
        .master-slider { -webkit-appearance: none; width: 100%; height: 8px; background: #334155; border-radius: 5px; outline: none; }
        .master-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; background: #3b82f6; border-radius: 50%; cursor: pointer; border: 2px solid white; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-4xl mx-auto space-y-6">
        <header class="text-center py-4">
            <h1 class="text-2xl font-bold text-blue-400">Timbre Designer</h1>
            <p class="text-slate-400 text-sm italic">Tailored for soulful arrangements & 64-bit precision</p>
        </header>

        <!-- Master Control -->
        <section class="card shadow-xl">
            <div class="flex items-center justify-between mb-2">
                <label class="text-sm font-bold uppercase tracking-wider text-slate-400">Master Volume</label>
                <span id="vol-display" class="text-blue-400 font-mono">70%</span>
            </div>
            <input type="range" id="master-vol" min="0" max="100" value="70" class="master-slider">
        </section>

        <!-- Frequency Toggles (Replaces Keyboard) -->
        <section class="card">
            <h2 class="text-sm font-bold uppercase tracking-wider text-slate-400 mb-4">Frequency Toggle (Up to 7)</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3" id="freq-grid">
                <!-- Toggle rows generated here -->
            </div>
        </section>

        <!-- Presets -->
        <section class="card overflow-x-auto">
            <h2 class="text-sm font-bold uppercase tracking-wider text-slate-400 mb-4">Presets</h2>
            <div class="flex gap-2 pb-2">
                <div id="preset-container" class="flex gap-2"></div>
            </div>
        </section>

        <!-- Partial Editor -->
        <section class="card">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-sm font-bold uppercase tracking-wider text-slate-400">Partial Editor</h2>
                <button onclick="addPartial()" class="bg-blue-600 px-4 py-2 rounded-lg text-xs font-bold uppercase">Add Partial</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm min-w-[600px]">
                    <thead>
                        <tr class="text-slate-500 border-b border-slate-700 text-[11px] uppercase">
                            <th class="pb-2">Ratio</th>
                            <th class="pb-2">Vol%</th>
                            <th class="pb-2">Atk</th>
                            <th class="pb-2">Dcy</th>
                            <th class="pb-2">Sus</th>
                            <th class="pb-2">Rel</th>
                            <th class="pb-2"></th>
                        </tr>
                    </thead>
                    <tbody id="partial-list"></tbody>
                </table>
            </div>
        </section>

        <!-- Export -->
        <section class="card grid grid-cols-2 gap-4">
            <div>
                <label class="block text-[10px] uppercase text-slate-500 mb-1">Duration (s)</label>
                <input type="number" id="export-duration" value="2.0" step="0.5" class="knob-input">
            </div>
            <div>
                <label class="block text-[10px] uppercase text-slate-500 mb-1">Export Freq</label>
                <input type="number" id="export-freq" value="440" class="knob-input">
            </div>
            <button id="export-btn" class="col-span-2 bg-emerald-600 hover:bg-emerald-500 py-4 rounded-xl font-bold uppercase tracking-widest transition-all">
                Export 64-bit WAV
            </button>
            <p id="export-status" class="col-span-2 text-center text-xs text-slate-500 italic"></p>
        </section>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const mainGainNode = audioCtx.createGain();
        mainGainNode.connect(audioCtx.destination);
        mainGainNode.gain.value = 0.7;

        let activeVoices = new Map();
        let keyboardFreqs = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88];
        const presets = [
            { name: "Nigun Organ", partials: [
                { ratio: 0.5, volume: 40, a: 0.2, d: 0.2, s: 0.8, r: 0.5 },
                { ratio: 1, volume: 80, a: 0.1, d: 0.1, s: 0.7, r: 0.4 },
                { ratio: 1.5, volume: 45, a: 0.1, d: 0.1, s: 0.6, r: 0.4 },
                { ratio: 2, volume: 30, a: 0.1, d: 0.1, s: 0.6, r: 0.3 }
            ]},
            { name: "Sinusoidal", partials: [{ ratio: 1, volume: 100, a: 0.05, d: 0.1, s: 1, r: 0.2 }] },
            { name: "Crystal", partials: [
                { ratio: 1, volume: 60, a: 0.01, d: 2, s: 0, r: 1 },
                { ratio: 4.01, volume: 30, a: 0.01, d: 1, s: 0, r: 0.5 },
                { ratio: 8.02, volume: 10, a: 0.01, d: 0.5, s: 0, r: 0.2 }
            ]},
            { name: "Reed", partials: [
                { ratio: 1, volume: 60, a: 0.1, d: 0.1, s: 0.8, r: 0.2 },
                { ratio: 3, volume: 40, a: 0.1, d: 0.1, s: 0.7, r: 0.2 },
                { ratio: 5, volume: 20, a: 0.1, d: 0.1, s: 0.6, r: 0.2 }
            ]},
            { name: "Inharmonic", partials: [
                { ratio: 1, volume: 50, a: 0.01, d: 0.5, s: 0.1, r: 0.5 },
                { ratio: 1.414, volume: 40, a: 0.01, d: 0.4, s: 0.1, r: 0.4 },
                { ratio: 2.718, volume: 30, a: 0.01, d: 0.3, s: 0.1, r: 0.3 }
            ]},
            { name: "Pad", partials: [
                { ratio: 1, volume: 50, a: 2, d: 1, s: 0.9, r: 3 },
                { ratio: 1.005, volume: 40, a: 2.5, d: 1, s: 0.9, r: 3.5 }
            ]}
        ];

        let currentPartials = JSON.parse(JSON.stringify(presets[0].partials));

        function initUI() {
            // Volume
            const volSlider = document.getElementById('master-vol');
            const volDisplay = document.getElementById('vol-display');
            volSlider.oninput = (e) => {
                const val = e.target.value;
                volDisplay.innerText = val + '%';
                mainGainNode.gain.setTargetAtTime(val / 100, audioCtx.currentTime, 0.02);
            };

            // Frequencies
            const grid = document.getElementById('freq-grid');
            keyboardFreqs.forEach((f, i) => {
                const row = document.createElement('div');
                row.className = "flex items-center gap-4 bg-slate-900/50 p-3 rounded-xl border border-slate-700";
                row.innerHTML = `
                    <input type="checkbox" id="check-${i}" onchange="toggleFreq(${i}, this.checked)">
                    <div class="flex-1">
                        <input type="number" step="0.01" value="${f}" 
                            onchange="updateFreq(${i}, this.value)" 
                            class="knob-input text-left bg-transparent border-none p-0 focus:ring-0">
                    </div>
                    <span class="text-slate-600 text-[10px] font-bold">Hz</span>
                `;
                grid.appendChild(row);
            });

            // Presets
            const pc = document.getElementById('preset-container');
            presets.forEach((p, i) => {
                const btn = document.createElement('button');
                btn.className = "whitespace-nowrap bg-slate-700 px-4 py-2 rounded-lg text-xs font-medium border border-slate-600 active:bg-blue-600";
                btn.innerText = p.name;
                btn.onclick = () => { currentPartials = JSON.parse(JSON.stringify(presets[i].partials)); renderPartials(); };
                pc.appendChild(btn);
            });

            renderPartials();
        }

        function toggleFreq(index, active) {
            const freq = keyboardFreqs[index];
            if (active) startVoice(freq);
            else stopVoice(freq);
        }

        function updateFreq(index, val) {
            const oldFreq = keyboardFreqs[index];
            const newFreq = parseFloat(val);
            keyboardFreqs[index] = newFreq;
            if (activeVoices.has(oldFreq)) {
                stopVoice(oldFreq);
                startVoice(newFreq);
            }
        }

        function renderPartials() {
            const list = document.getElementById('partial-list');
            list.innerHTML = '';
            currentPartials.forEach((p, i) => {
                const row = document.createElement('tr');
                row.className = 'border-b border-slate-700/50';
                row.innerHTML = `
                    <td class="py-3 px-1"><input type="number" step="0.001" value="${p.ratio}" onchange="updateP(${i},'ratio',this.value)" class="knob-input w-16"></td>
                    <td class="py-3 px-1"><input type="number" value="${p.volume}" onchange="updateP(${i},'volume',this.value)" class="knob-input w-16"></td>
                    <td class="py-3 px-1"><input type="number" step="0.01" value="${p.a}" onchange="updateP(${i},'a',this.value)" class="knob-input w-16"></td>
                    <td class="py-3 px-1"><input type="number" step="0.01" value="${p.d}" onchange="updateP(${i},'d',this.value)" class="knob-input w-16"></td>
                    <td class="py-3 px-1"><input type="number" step="0.01" value="${p.s}" onchange="updateP(${i},'s',this.value)" class="knob-input w-16"></td>
                    <td class="py-3 px-1"><input type="number" step="0.01" value="${p.r}" onchange="updateP(${i},'r',this.value)" class="knob-input w-16"></td>
                    <td class="py-3 px-1"><button onclick="removePartial(${i})" class="text-red-500 font-bold px-2">✕</button></td>
                `;
                list.appendChild(row);
            });
        }

        function updateP(i, k, v) { currentPartials[i][k] = parseFloat(v); }
        function addPartial() { currentPartials.push({ratio:1, volume:50, a:0.1, d:0.1, s:0.5, r:0.5}); renderPartials(); }
        function removePartial(i) { currentPartials.splice(i, 1); renderPartials(); }

        function startVoice(freq) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const voiceNodes = [];
            const now = audioCtx.currentTime;

            currentPartials.forEach(p => {
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.frequency.setValueAtTime(freq * p.ratio, now);
                g.gain.setValueAtTime(0, now);
                g.gain.linearRampToValueAtTime((p.volume/100)/currentPartials.length, now + p.a);
                g.gain.linearRampToValueAtTime((p.s * (p.volume/100))/currentPartials.length, now + p.a + p.d);
                osc.connect(g);
                g.connect(mainGainNode);
                osc.start();
                voiceNodes.push({ osc, g, p });
            });
            activeVoices.set(freq, voiceNodes);
        }

        function stopVoice(freq) {
            const nodes = activeVoices.get(freq);
            if (!nodes) return;
            const now = audioCtx.currentTime;
            nodes.forEach(({ osc, g, p }) => {
                g.gain.cancelScheduledValues(now);
                g.gain.setValueAtTime(g.gain.value, now);
                g.gain.exponentialRampToValueAtTime(0.0001, now + p.r);
                osc.stop(now + p.r + 0.1);
            });
            activeVoices.delete(freq);
        }

        async function exportWav() {
            const status = document.getElementById('export-status');
            const duration = parseFloat(document.getElementById('export-duration').value);
            const baseFreq = parseFloat(document.getElementById('export-freq').value);
            const sampleRate = 44100;
            const numSamples = Math.floor(sampleRate * duration);
            status.innerText = "Encoding 64-bit Audio...";

            const buffer = new Float64Array(numSamples);
            for (let i = 0; i < numSamples; i++) {
                const t = i / sampleRate;
                let sample = 0;
                currentPartials.forEach(p => {
                    let amp = 0;
                    if (t < p.a) amp = (t / p.a) * (p.volume/100);
                    else if (t < p.a + p.d) amp = (p.volume/100) + ((t-p.a)/p.d) * (p.s*(p.volume/100) - (p.volume/100));
                    else if (t < duration - p.r) amp = p.s * (p.volume/100);
                    else if (t < duration) amp = (p.s*(p.volume/100)) * (1 - (t-(duration-p.r))/p.r);
                    sample += amp * Math.sin(2 * Math.PI * baseFreq * p.ratio * t);
                });
                buffer[i] = sample / currentPartials.length;
            }

            const headerSize = 44;
            const dataSize = numSamples * 8;
            const fileBuffer = new ArrayBuffer(headerSize + dataSize);
            const view = new DataView(fileBuffer);
            const writeStr = (o, s) => { for(let i=0; i<s.length; i++) view.setUint8(o+i, s.charCodeAt(i)); };

            writeStr(0, 'RIFF'); view.setUint32(4, 36 + dataSize, true);
            writeStr(8, 'WAVE'); writeStr(12, 'fmt ');
            view.setUint32(16, 16, true); view.setUint16(20, 3, true); // IEEE
            view.setUint16(22, 1, true); view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 8, true); view.setUint16(32, 8, true);
            view.setUint16(34, 64, true); writeStr(36, 'data');
            view.setUint32(40, dataSize, true);
            for (let i = 0; i < numSamples; i++) view.setFloat64(44 + (i * 8), buffer[i], true);

            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([fileBuffer], { type: 'audio/wav' }));
            a.download = `timbre_64bit.wav`;
            a.click();
            status.innerText = "Download Ready.";
        }

        document.getElementById('export-btn').onclick = exportWav;
        initUI();
    </script>
</body>
</html>
