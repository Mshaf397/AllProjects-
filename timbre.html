<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precision Harmonic Synthesizer + ADSR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f1f5f9;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .canvas-container {
            background: rgba(15, 23, 42, 0.9);
            border-radius: 12px;
            border: 1px solid #334155;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.7);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .node-active { border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
        
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { 
            opacity: 1;
        }

        .adsr-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
        }

        .adsr-field {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .adsr-label {
            font-size: 9px;
            text-transform: uppercase;
            color: #64748b;
            font-weight: 700;
        }
    </style>
</head>
<body class="p-4 md:p-6">
    <div class="max-w-7xl mx-auto">
        <header class="mb-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold text-blue-400">Precision Timbre Synthesizer</h1>
                <p class="text-slate-400 text-sm">Now featuring individual high-precision ADSR envelopes per partial.</p>
            </div>
            <div class="flex gap-2">
                <button id="playBtn" class="bg-blue-600 hover:bg-blue-500 text-white font-bold px-6 py-2 rounded-lg transition-all">START AUDIO</button>
                <button id="stopBtn" class="bg-slate-700 hover:bg-slate-600 text-white font-bold px-6 py-2 rounded-lg transition-all">RELEASE</button>
                <button id="openExportModal" class="bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2 rounded-lg transition-all flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Export
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <!-- VOICE NODES -->
            <div class="lg:col-span-3 space-y-4">
                <section class="bg-slate-800 p-5 rounded-xl border border-slate-700">
                    <h2 class="text-lg font-semibold text-blue-300 mb-4">Voice Nodes</h2>
                    <div id="voiceNodes" class="space-y-3"></div>
                    <div class="mt-4 pt-4 border-t border-slate-700">
                        <label class="block text-[10px] uppercase text-slate-500 mb-2 font-bold">Master Gain</label>
                        <input type="range" id="masterVol" min="0" max="1" step="0.01" value="0.3" class="w-full h-1.5 bg-slate-700 rounded-lg appearance-none cursor-pointer">
                    </div>
                </section>

                <section class="bg-slate-800 p-5 rounded-xl border border-slate-700">
                    <h2 class="text-lg font-semibold mb-3 text-slate-300">Presets</h2>
                    <div class="grid grid-cols-1 gap-2">
                        <button onclick="applyPreset('sine')" class="text-left text-xs bg-slate-700 p-2 rounded hover:bg-slate-600">Pure Sine</button>
                        <button onclick="applyPreset('organ')" class="text-left text-xs bg-slate-700 p-2 rounded hover:bg-slate-600">Soft Organ (Long Release)</button>
                        <button onclick="applyPreset('pluck')" class="text-left text-xs bg-slate-700 p-2 rounded hover:bg-slate-600">Harmonic Pluck (Fast Decay)</button>
                        <button onclick="applyPreset('nigun')" class="text-left text-xs bg-blue-900/40 p-2 rounded hover:bg-blue-800/40 border border-blue-500/30 text-blue-200">Elul Nigun (Spirit)</button>
                    </div>
                </section>
            </div>

            <!-- OVERTONE LIST -->
            <div class="lg:col-span-9 space-y-6">
                <div class="canvas-container p-4">
                    <canvas id="visualizer" class="w-full h-32 rounded"></canvas>
                </div>

                <div class="bg-slate-800 p-6 rounded-xl border border-slate-700">
                    <div class="flex justify-between items-center mb-6">
                        <div>
                            <h2 class="text-xl font-semibold text-slate-200">Harmonic Profile</h2>
                            <p class="text-xs text-slate-500">Define partials, volume, and individual envelopes.</p>
                        </div>
                        <button id="addOvertone" class="bg-blue-600 hover:bg-blue-500 text-sm px-4 py-2 rounded-full font-bold transition-all">+ Add Partial</button>
                    </div>
                    
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="text-[10px] uppercase text-slate-500 tracking-wider">
                                    <th class="pb-3 pl-2">Partial</th>
                                    <th class="pb-3">Ratio</th>
                                    <th class="pb-3">Vol (%)</th>
                                    <th class="pb-3">ADSR (Sustain 0-1, Time in Sec)</th>
                                    <th class="pb-3 w-10"></th>
                                </tr>
                            </thead>
                            <tbody id="overtoneList" class="divide-y divide-slate-700"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Export Modal -->
    <div id="exportModal" class="fixed inset-0 bg-black/80 hidden items-center justify-center p-4 z-50">
        <div class="bg-slate-800 border border-slate-700 p-8 rounded-2xl max-w-sm w-full shadow-2xl">
            <h3 class="text-xl font-bold mb-2">Export Audio</h3>
            <div class="mb-6">
                <label class="block text-sm font-medium mb-2 text-slate-400">Duration (seconds)</label>
                <input type="number" id="exportDuration" value="2.0" step="0.1" min="0.1" max="60" 
                    class="w-full bg-slate-900 border border-slate-600 rounded px-3 py-2 outline-none">
            </div>
            <div class="flex gap-3">
                <button id="cancelExport" class="flex-1 bg-slate-700 py-2 rounded-lg">Cancel</button>
                <button id="startExport" class="flex-1 bg-emerald-600 py-2 rounded-lg font-bold">Download WAV</button>
            </div>
            <div id="exportStatus" class="hidden mt-4 text-center text-sm text-blue-400">Rendering...</div>
        </div>
    </div>

    <script>
        let audioCtx, masterGain, analyzer;
        let isPlaying = false;
        let activeVoicesNodes = []; // Stores { oscs: [], gains: [] } for each active voice

        let voices = [
            { active: true, freq: 220.00 },
            { active: false, freq: 277.18 },
            { active: false, freq: 329.63 },
            { active: false, freq: 392.00 },
            { active: false, freq: 440.00 },
            { active: false, freq: 523.25 },
            { active: false, freq: 659.25 }
        ];

        let overtones = [
            { ratio: 1.0, volumePct: 100.00, a: 0.05, d: 0.1, s: 0.7, r: 0.5 },
            { ratio: 2.0, volumePct: 50.00, a: 0.02, d: 0.2, s: 0.4, r: 0.3 },
            { ratio: 3.0, volumePct: 33.33, a: 0.1, d: 0.3, s: 0.2, r: 0.8 }
        ];

        const voiceContainer = document.getElementById('voiceNodes');
        const overtoneList = document.getElementById('overtoneList');
        const playBtn = document.getElementById('playBtn');
        const stopBtn = document.getElementById('stopBtn');
        const canvas = document.getElementById('visualizer');
        const canvasCtx = canvas.getContext('2d');
        const masterVolInput = document.getElementById('masterVol');

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = audioCtx.createGain();
                analyzer = audioCtx.createAnalyser();
                analyzer.fftSize = 2048;
                masterGain.connect(analyzer);
                analyzer.connect(audioCtx.destination);
                masterGain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            }
        }

        function renderVoices() {
            voiceContainer.innerHTML = '';
            voices.forEach((v, i) => {
                const div = document.createElement('div');
                div.className = `p-3 rounded-lg border transition-all flex items-center gap-3 ${v.active ? 'node-active border-blue-500' : 'bg-slate-900/30 border-slate-700'}`;
                div.innerHTML = `
                    <input type="checkbox" ${v.active ? 'checked' : ''} onchange="toggleVoice(${i})" class="w-4 h-4">
                    <div class="flex-1">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-[9px] text-slate-500 font-bold uppercase">Voice ${i+1}</span>
                            <span class="text-[10px] font-mono text-blue-400">${v.freq.toFixed(2)}Hz</span>
                        </div>
                        <input type="number" step="0.01" value="${v.freq}" onchange="updateVoiceFreq(${i}, this.value)" 
                            class="w-full bg-slate-950/50 border border-slate-700 rounded px-2 py-1 text-xs outline-none">
                    </div>
                `;
                voiceContainer.appendChild(div);
            });
        }

        function renderOvertones() {
            overtoneList.innerHTML = '';
            overtones.forEach((ov, i) => {
                const tr = document.createElement('tr');
                tr.className = "group hover:bg-slate-700/30 transition-colors align-top";
                tr.innerHTML = `
                    <td class="py-4 pl-2 text-xs font-bold text-slate-400">#${i+1}</td>
                    <td class="py-4">
                        <input type="number" step="0.0001" value="${ov.ratio}" onchange="updateOvertone(${i}, 'ratio', this.value)"
                            class="bg-slate-900 border border-slate-700 rounded px-2 py-1 text-sm w-20 focus:border-blue-500 outline-none">
                    </td>
                    <td class="py-4">
                        <input type="number" step="0.1" value="${ov.volumePct}" onchange="updateOvertone(${i}, 'volumePct', this.value)"
                            class="bg-slate-900 border border-slate-700 rounded px-2 py-1 text-sm w-20 focus:border-emerald-500 outline-none font-mono">
                    </td>
                    <td class="py-4 pr-4">
                        <div class="adsr-grid">
                            <div class="adsr-field">
                                <span class="adsr-label">A</span>
                                <input type="number" step="0.01" min="0" value="${ov.a}" onchange="updateOvertone(${i}, 'a', this.value)" 
                                    class="bg-slate-950 border border-slate-700 rounded px-1.5 py-1 text-xs outline-none focus:border-blue-400">
                            </div>
                            <div class="adsr-field">
                                <span class="adsr-label">D</span>
                                <input type="number" step="0.01" min="0" value="${ov.d}" onchange="updateOvertone(${i}, 'd', this.value)" 
                                    class="bg-slate-950 border border-slate-700 rounded px-1.5 py-1 text-xs outline-none focus:border-blue-400">
                            </div>
                            <div class="adsr-field">
                                <span class="adsr-label">S</span>
                                <input type="number" step="0.01" min="0" max="1" value="${ov.s}" onchange="updateOvertone(${i}, 's', this.value)" 
                                    class="bg-slate-950 border border-slate-700 rounded px-1.5 py-1 text-xs outline-none focus:border-blue-400">
                            </div>
                            <div class="adsr-field">
                                <span class="adsr-label">R</span>
                                <input type="number" step="0.01" min="0" value="${ov.r}" onchange="updateOvertone(${i}, 'r', this.value)" 
                                    class="bg-slate-950 border border-slate-700 rounded px-1.5 py-1 text-xs outline-none focus:border-blue-400">
                            </div>
                        </div>
                    </td>
                    <td class="py-4 text-right pr-2">
                        <button onclick="removeOvertone(${i})" class="text-slate-600 hover:text-red-400 transition-opacity">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>
                    </td>
                `;
                overtoneList.appendChild(tr);
            });
        }

        function toggleVoice(i) { voices[i].active = !voices[i].active; renderVoices(); }
        function updateVoiceFreq(i, val) { voices[i].freq = parseFloat(val); }
        function updateOvertone(i, key, val) { overtones[i][key] = parseFloat(val); }
        function removeOvertone(i) { overtones.splice(i, 1); renderOvertones(); }
        
        document.getElementById('addOvertone').onclick = () => {
            const last = overtones.length > 0 ? overtones[overtones.length-1].ratio : 1;
            overtones.push({ ratio: parseFloat((last + 1).toFixed(2)), volumePct: 10.0, a: 0.1, d: 0.1, s: 0.5, r: 0.5 });
            renderOvertones();
        };

        playBtn.onclick = async () => {
            initAudio();
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            
            // Clean up existing if any
            activeVoicesNodes.forEach(v => v.gains.forEach(g => g.gain.cancelScheduledValues(audioCtx.currentTime)));
            
            isPlaying = true;
            const now = audioCtx.currentTime;
            const activeV = voices.filter(v => v.active);
            
            activeVoicesNodes = activeV.map(v => {
                const voiceNodes = { oscs: [], gains: [] };
                overtones.forEach(ov => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    
                    osc.frequency.setValueAtTime(v.freq * ov.ratio, now);
                    
                    const peakVol = (ov.volumePct / 100) / activeV.length;
                    const sustainVol = peakVol * ov.s;
                    
                    // Trigger Attack
                    gain.gain.setValueAtTime(0, now);
                    gain.gain.linearRampToValueAtTime(peakVol, now + Math.max(0.001, ov.a));
                    // Trigger Decay to Sustain
                    gain.gain.linearRampToValueAtTime(sustainVol, now + Math.max(0.001, ov.a) + Math.max(0.001, ov.d));
                    
                    osc.connect(gain);
                    gain.connect(masterGain);
                    osc.start(now);
                    
                    voiceNodes.oscs.push(osc);
                    voiceNodes.gains.push(gain);
                });
                return voiceNodes;
            });

            playBtn.classList.add('bg-green-600');
            draw();
        };

        stopBtn.onclick = () => {
            if (!isPlaying) return;
            const now = audioCtx.currentTime;
            
            activeVoicesNodes.forEach(vn => {
                vn.gains.forEach((g, idx) => {
                    const ov = overtones[idx];
                    if (!ov) return;
                    const releaseTime = Math.max(0.001, ov.r);
                    g.gain.cancelScheduledValues(now);
                    g.gain.setValueAtTime(g.gain.value, now);
                    g.gain.exponentialRampToValueAtTime(0.0001, now + releaseTime);
                });
                
                // Stop oscillators after the longest release
                const maxRelease = Math.max(...overtones.map(o => o.r));
                setTimeout(() => {
                    vn.oscs.forEach(o => { try { o.stop(); o.disconnect(); } catch(e){} });
                }, maxRelease * 1000 + 100);
            });
            
            isPlaying = false;
            playBtn.classList.remove('bg-green-600');
        };

        masterVolInput.oninput = (e) => {
            if (masterGain) masterGain.gain.setTargetAtTime(e.target.value, audioCtx.currentTime, 0.02);
        };

        function applyPreset(type) {
            if (type === 'sine') {
                overtones = [{ ratio: 1.0, volumePct: 100.0, a: 0.1, d: 0, s: 1, r: 0.1 }];
            } else if (type === 'organ') {
                overtones = [
                    { ratio: 1, volumePct: 100, a: 0.2, d: 0.1, s: 0.8, r: 1.5 },
                    { ratio: 2, volumePct: 40, a: 0.25, d: 0.1, s: 0.6, r: 1.2 },
                    { ratio: 3, volumePct: 20, a: 0.3, d: 0.1, s: 0.4, r: 1.0 }
                ];
            } else if (type === 'pluck') {
                overtones = [
                    { ratio: 1, volumePct: 100, a: 0.005, d: 0.6, s: 0, r: 0.1 },
                    { ratio: 2, volumePct: 60, a: 0.005, d: 0.3, s: 0, r: 0.1 },
                    { ratio: 3.5, volumePct: 30, a: 0.005, d: 0.15, s: 0, r: 0.1 }
                ];
            } else if (type === 'nigun') {
                overtones = [
                    { ratio: 1, volumePct: 100, a: 0.1, d: 0.2, s: 0.7, r: 0.8 }, 
                    { ratio: 2, volumePct: 62.5, a: 0.15, d: 0.2, s: 0.5, r: 0.7 }, 
                    { ratio: 3, volumePct: 44.4, a: 0.2, d: 0.2, s: 0.4, r: 0.6 }
                ];
                voices[0].freq = 146.83; 
            }
            renderOvertones();
        }

        // --- Export ---
        document.getElementById('openExportModal').onclick = () => { document.getElementById('exportModal').style.display = 'flex'; };
        document.getElementById('cancelExport').onclick = () => { document.getElementById('exportModal').style.display = 'none'; };

        document.getElementById('startExport').onclick = async () => {
            const duration = Math.max(0.1, Math.min(60, parseFloat(document.getElementById('exportDuration').value)));
            const status = document.getElementById('exportStatus');
            status.classList.remove('hidden');
            
            try {
                const sr = 44100;
                const offlineCtx = new OfflineAudioContext(1, sr * duration, sr);
                const offlineMaster = offlineCtx.createGain();
                const activeV = voices.filter(v => v.active);

                activeV.forEach(v => {
                    overtones.forEach(ov => {
                        const osc = offlineCtx.createOscillator();
                        const g = offlineCtx.createGain();
                        const peak = (ov.volumePct / 100) / activeV.length;
                        
                        osc.frequency.setValueAtTime(v.freq * ov.ratio, 0);
                        
                        // Basic ADSR for export (Attack/Decay then Sustain until near end then Release)
                        g.gain.setValueAtTime(0, 0);
                        g.gain.linearRampToValueAtTime(peak, ov.a);
                        g.gain.linearRampToValueAtTime(peak * ov.s, ov.a + ov.d);
                        
                        // Release start
                        const rStart = duration - ov.r;
                        if (rStart > (ov.a + ov.d)) {
                            g.gain.setValueAtTime(peak * ov.s, rStart);
                            g.gain.linearRampToValueAtTime(0, duration);
                        } else {
                            g.gain.linearRampToValueAtTime(0, duration);
                        }

                        osc.connect(g);
                        g.connect(offlineMaster);
                        osc.start(0);
                    });
                });

                offlineMaster.connect(offlineCtx.destination);
                offlineMaster.gain.setValueAtTime(masterVolInput.value, 0);

                const buffer = await offlineCtx.startRendering();
                const wavBlob = bufferTo64BitWav(buffer);
                const url = URL.createObjectURL(wavBlob);
                const a = document.createElement('a');
                a.href = url; a.download = `synth-export-${Date.now()}.wav`; a.click();
            } catch (err) { console.error(err); } 
            finally { status.classList.add('hidden'); document.getElementById('exportModal').style.display = 'none'; }
        };

        function bufferTo64BitWav(buffer) {
            const samples = buffer.getChannelData(0);
            const view = new DataView(new ArrayBuffer(44 + samples.length * 8));
            const s = (v, o, str) => { for (let i=0; i<str.length; i++) v.setUint8(o + i, str.charCodeAt(i)); };
            s(view, 0, 'RIFF'); view.setUint32(4, 36 + samples.length * 8, true); s(view, 8, 'WAVE');
            s(view, 12, 'fmt '); view.setUint32(16, 16, true); view.setUint16(20, 3, true); 
            view.setUint16(22, 1, true); view.setUint32(24, 44100, true); view.setUint32(28, 44100 * 8, true);
            view.setUint16(32, 8, true); view.setUint16(34, 64, true); s(view, 36, 'data');
            view.setUint32(40, samples.length * 8, true);
            for (let i = 0; i < samples.length; i++) view.setFloat64(44 + i*8, samples[i], true);
            return new Blob([view], { type: 'audio/wav' });
        }

        function draw() {
            if (!isPlaying) return;
            requestAnimationFrame(draw);
            const data = new Uint8Array(analyzer.frequencyBinCount);
            analyzer.getByteTimeDomainData(data);
            canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
            canvasCtx.lineWidth = 2;
            canvasCtx.strokeStyle = '#3b82f6';
            canvasCtx.beginPath();
            const sw = canvas.width / analyzer.frequencyBinCount;
            let x = 0;
            for (let i = 0; i < analyzer.frequencyBinCount; i++) {
                const y = (data[i] / 128.0) * canvas.height / 2;
                if (i === 0) canvasCtx.moveTo(x, y); else canvasCtx.lineTo(x, y);
                x += sw;
            }
            canvasCtx.stroke();
        }

        window.addEventListener('resize', () => { canvas.width = canvas.parentElement.clientWidth; canvas.height = 128; });
        canvas.width = canvas.parentElement.clientWidth; canvas.height = 128;
        renderVoices();
        renderOvertones();
    </script>
</body>
</html>
