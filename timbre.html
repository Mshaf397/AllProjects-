<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chordal Timbre Synthesizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f1f5f9;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .slider-thumb::-webkit-slider-thumb {
            appearance: none;
            width: 16px;
            height: 16px;
            background: #3b82f6;
            cursor: pointer;
            border-radius: 50%;
            border: 2px solid white;
        }
        .canvas-container {
            background: rgba(15, 23, 42, 0.8);
            border-radius: 12px;
            border: 1px solid #334155;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        /* Node Toggle Animation */
        .node-active { border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
    </style>
</head>
<body class="p-4 md:p-6">
    <div class="max-w-6xl mx-auto">
        <header class="mb-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">Chordal Timbre Synthesizer</h1>
                <p class="text-slate-400 text-sm">Experiment with intervals, clusters, and harmonic color.</p>
            </div>
            <div class="flex gap-2">
                <button id="playBtn" class="bg-blue-600 hover:bg-blue-500 text-white font-bold px-6 py-2 rounded-lg transition-all shadow-lg shadow-blue-900/20">START AUDIO</button>
                <button id="stopBtn" class="bg-slate-700 hover:bg-slate-600 text-white font-bold px-6 py-2 rounded-lg transition-all">STOP</button>
                <button id="openExportModal" class="bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2 rounded-lg transition-all flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Export
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <!-- LEFT: VOICE NODES (The 7 Waves) -->
            <div class="lg:col-span-4 space-y-4">
                <section class="bg-slate-800 p-5 rounded-xl border border-slate-700">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg font-semibold text-blue-300">Voice Nodes (Up to 7)</h2>
                        <span class="text-[10px] text-slate-500 uppercase tracking-widest">Polyphonic Base</span>
                    </div>
                    <div id="voiceNodes" class="space-y-3">
                        <!-- Voices 1-7 injected here -->
                    </div>
                    <div class="mt-4 pt-4 border-t border-slate-700">
                        <label class="block text-[10px] uppercase text-slate-500 mb-2 font-bold">Master Mix Volume</label>
                        <input type="range" id="masterVol" min="0" max="1" step="0.01" value="0.4" class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer slider-thumb">
                    </div>
                </section>

                <section class="bg-slate-800 p-5 rounded-xl border border-slate-700">
                    <h2 class="text-lg font-semibold mb-3 text-slate-300">Timbre Presets</h2>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="applyPreset('sine')" class="text-xs bg-slate-700 p-2 rounded hover:bg-slate-600 border border-transparent hover:border-slate-500 transition-all">Pure Sine</button>
                        <button onclick="applyPreset('nigun')" class="text-xs bg-blue-900/40 p-2 rounded hover:bg-blue-800/40 border border-blue-500/30 text-blue-200">Nigun (Warm)</button>
                        <button onclick="applyPreset('organ')" class="text-xs bg-slate-700 p-2 rounded hover:bg-slate-600 border border-transparent">Pipe Organ</button>
                        <button onclick="applyPreset('bell')" class="text-xs bg-slate-700 p-2 rounded hover:bg-slate-600 border border-transparent">Metallic Bell</button>
                    </div>
                </section>
            </div>

            <!-- RIGHT: TIMBRE & VISUALIZER -->
            <div class="lg:col-span-8 space-y-6">
                <div class="canvas-container p-4">
                    <canvas id="visualizer" class="w-full h-40 rounded"></canvas>
                </div>

                <div class="bg-slate-800 p-6 rounded-xl border border-slate-700">
                    <div class="flex justify-between items-center mb-6">
                        <div>
                            <h2 class="text-xl font-semibold text-slate-200">Common Overtone Structure</h2>
                            <p class="text-xs text-slate-500">Applied to all active voice nodes</p>
                        </div>
                        <button id="addOvertone" class="bg-blue-600 hover:bg-blue-500 text-sm px-4 py-2 rounded-full font-bold transition-all">+ Add Harmonic</button>
                    </div>
                    
                    <div id="overtoneList" class="grid grid-cols-1 md:grid-cols-2 gap-4 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                        <!-- Overtones injected here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Export Modal -->
    <div id="exportModal" class="fixed inset-0 bg-black/80 hidden items-center justify-center p-4 z-50">
        <div class="bg-slate-800 border border-slate-700 p-8 rounded-2xl max-w-sm w-full shadow-2xl">
            <h3 class="text-xl font-bold mb-2 text-emerald-400">Export WAV</h3>
            <p class="text-slate-400 text-sm mb-6">High-fidelity 64-bit Float PCM rendering.</p>
            <div class="mb-6">
                <label class="block text-sm font-medium mb-2">Duration (seconds)</label>
                <input type="number" id="exportDuration" value="3.0" step="0.5" min="0.25" max="60" 
                    class="w-full bg-slate-900 border border-slate-600 rounded px-3 py-2 outline-none focus:border-blue-500">
            </div>
            <div class="flex gap-3">
                <button id="cancelExport" class="flex-1 bg-slate-700 hover:bg-slate-600 py-2 rounded-lg">Cancel</button>
                <button id="startExport" class="flex-1 bg-emerald-600 hover:bg-emerald-500 py-2 rounded-lg font-bold">Download</button>
            </div>
            <div id="exportStatus" class="hidden mt-4 text-center text-sm text-blue-400 animate-pulse">Rendering...</div>
        </div>
    </div>

    <script>
        let audioCtx;
        let masterGain;
        let analyzer;
        let isPlaying = false;

        // State
        let voices = [
            { active: true, freq: 220 },
            { active: false, freq: 261.63 },
            { active: false, freq: 329.63 },
            { active: false, freq: 392.00 },
            { active: false, freq: 440.00 },
            { active: false, freq: 523.25 },
            { active: false, freq: 659.25 }
        ];

        let overtones = [
            { ratio: 1, volume: 1.0 },
            { ratio: 2, volume: 0.5 },
            { ratio: 3, volume: 0.25 }
        ];

        let activeOscillators = []; // Stores {osc, gain} objects

        // Elements
        const voiceContainer = document.getElementById('voiceNodes');
        const overtoneList = document.getElementById('overtoneList');
        const playBtn = document.getElementById('playBtn');
        const stopBtn = document.getElementById('stopBtn');
        const canvas = document.getElementById('visualizer');
        const canvasCtx = canvas.getContext('2d');
        const masterVolInput = document.getElementById('masterVol');

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = audioCtx.createGain();
                analyzer = audioCtx.createAnalyser();
                analyzer.fftSize = 2048;
                masterGain.connect(analyzer);
                analyzer.connect(audioCtx.destination);
                masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
            }
        }

        function renderVoices() {
            voiceContainer.innerHTML = '';
            voices.forEach((v, i) => {
                const div = document.createElement('div');
                div.className = `p-3 rounded-lg border transition-all flex items-center gap-3 ${v.active ? 'node-active border-blue-500' : 'bg-slate-900/30 border-slate-700'}`;
                div.innerHTML = `
                    <input type="checkbox" ${v.active ? 'checked' : ''} onchange="toggleVoice(${i})" class="w-5 h-5 rounded border-slate-600 bg-slate-800 text-blue-500 focus:ring-blue-500">
                    <div class="flex-1">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-[10px] text-slate-500 font-bold">NODE ${i+1}</span>
                            <span class="text-xs font-mono text-blue-400">${v.freq.toFixed(1)}Hz</span>
                        </div>
                        <input type="number" step="0.1" value="${v.freq}" onchange="updateVoiceFreq(${i}, this.value)" 
                            class="w-full bg-slate-950/50 border border-slate-700 rounded px-2 py-1 text-xs outline-none focus:border-blue-400">
                    </div>
                `;
                voiceContainer.appendChild(div);
            });
            if (isPlaying) restartAudio();
        }

        function renderOvertones() {
            overtoneList.innerHTML = '';
            overtones.forEach((ov, i) => {
                const div = document.createElement('div');
                div.className = "bg-slate-900/50 p-3 rounded-lg border border-slate-700 space-y-2";
                div.innerHTML = `
                    <div class="flex justify-between items-center">
                        <span class="text-[10px] text-slate-500 uppercase">Ratio x${ov.ratio}</span>
                        <button onclick="removeOvertone(${i})" class="text-slate-600 hover:text-red-400">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>
                    </div>
                    <div class="flex items-center gap-3">
                        <input type="number" step="0.01" value="${ov.ratio}" onchange="updateOvertone(${i}, 'ratio', this.value)"
                            class="w-16 bg-slate-800 border border-slate-700 rounded px-1 py-1 text-xs outline-none">
                        <input type="range" min="0" max="1" step="0.01" value="${ov.volume}" oninput="updateOvertone(${i}, 'volume', this.value)"
                            class="flex-1 h-1.5 bg-slate-700 rounded-lg appearance-none cursor-pointer slider-thumb">
                    </div>
                `;
                overtoneList.appendChild(div);
            });
            if (isPlaying) restartAudio();
        }

        function toggleVoice(i) { voices[i].active = !voices[i].active; renderVoices(); }
        function updateVoiceFreq(i, val) { voices[i].freq = parseFloat(val); if (isPlaying) restartAudio(); }
        function updateOvertone(i, key, val) { overtones[i][key] = parseFloat(val); if (isPlaying) restartAudio(); }
        function removeOvertone(i) { overtones.splice(i, 1); renderOvertones(); }
        
        document.getElementById('addOvertone').onclick = () => {
            const last = overtones.length > 0 ? overtones[overtones.length-1].ratio : 1;
            overtones.push({ ratio: Math.round(last + 1), volume: 0.2 });
            renderOvertones();
        };

        function restartAudio() {
            if (!audioCtx) return;
            activeOscillators.forEach(o => { try { o.osc.stop(); o.osc.disconnect(); } catch(e) {} });
            activeOscillators = [];

            const now = audioCtx.currentTime;
            voices.filter(v => v.active).forEach(v => {
                overtones.forEach(ov => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(v.freq * ov.ratio, now);
                    gain.gain.setValueAtTime(ov.volume / voices.filter(x => x.active).length, now); // Normalize gain by voice count
                    
                    osc.connect(gain);
                    gain.connect(masterGain);
                    osc.start();
                    activeOscillators.push({ osc, gain });
                });
            });
        }

        playBtn.onclick = async () => {
            initAudio();
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            isPlaying = true;
            restartAudio();
            masterGain.gain.setTargetAtTime(masterVolInput.value, audioCtx.currentTime, 0.05);
            playBtn.classList.add('ring-2', 'ring-blue-400');
            draw();
        };

        stopBtn.onclick = () => {
            if (!masterGain) return;
            masterGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05);
            setTimeout(() => {
                activeOscillators.forEach(o => o.osc.stop());
                isPlaying = false;
                playBtn.classList.remove('ring-2', 'ring-blue-400');
            }, 100);
        };

        masterVolInput.oninput = (e) => {
            if (masterGain) masterGain.gain.setTargetAtTime(e.target.value, audioCtx.currentTime, 0.02);
        };

        function applyPreset(type) {
            if (type === 'sine') {
                overtones = [{ ratio: 1, volume: 1 }];
            } else if (type === 'nigun') {
                overtones = [
                    { ratio: 1, volume: 1 }, { ratio: 2, volume: 0.65 }, { ratio: 3, volume: 0.45 },
                    { ratio: 4, volume: 0.1 }, { ratio: 5, volume: 0.2 }, { ratio: 6, volume: 0.05 }
                ];
            } else if (type === 'organ') {
                overtones = [
                    { ratio: 0.5, volume: 0.6 }, { ratio: 1, volume: 1 }, { ratio: 1.5, volume: 0.4 },
                    { ratio: 2, volume: 0.5 }, { ratio: 3, volume: 0.2 }, { ratio: 4, volume: 0.1 }
                ];
            } else if (type === 'bell') {
                overtones = [
                    { ratio: 1, volume: 1 }, { ratio: 2.76, volume: 0.5 }, { ratio: 5.4, volume: 0.3 },
                    { ratio: 8.9, volume: 0.2 }, { ratio: 11.35, volume: 0.15 }
                ];
            }
            renderOvertones();
        }

        // --- Export & Visualization ---
        
        document.getElementById('openExportModal').onclick = () => { document.getElementById('exportModal').style.display = 'flex'; };
        document.getElementById('cancelExport').onclick = () => { document.getElementById('exportModal').style.display = 'none'; };

        document.getElementById('startExport').onclick = async () => {
            const duration = Math.max(0.25, Math.min(60, parseFloat(document.getElementById('exportDuration').value)));
            const status = document.getElementById('exportStatus');
            status.classList.remove('hidden');
            
            try {
                const sampleRate = 44100;
                const offlineCtx = new OfflineAudioContext(1, sampleRate * duration, sampleRate);
                const offlineGain = offlineCtx.createGain();
                const masterVol = parseFloat(masterVolInput.value);
                const activeVoiceCount = voices.filter(v => v.active).length || 1;

                voices.filter(v => v.active).forEach(v => {
                    overtones.forEach(ov => {
                        const osc = offlineCtx.createOscillator();
                        const g = offlineCtx.createGain();
                        osc.frequency.setValueAtTime(v.freq * ov.ratio, 0);
                        g.gain.setValueAtTime(ov.volume / activeVoiceCount, 0);
                        osc.connect(g);
                        g.connect(offlineGain);
                        osc.start(0);
                    });
                });

                offlineGain.connect(offlineCtx.destination);
                offlineGain.gain.setValueAtTime(0, 0);
                offlineGain.gain.linearRampToValueAtTime(masterVol, 0.05);
                offlineGain.gain.setValueAtTime(masterVol, duration - 0.05);
                offlineGain.gain.linearRampToValueAtTime(0, duration);

                const renderedBuffer = await offlineCtx.startRendering();
                const wavBlob = bufferTo64BitWav(renderedBuffer);
                const url = URL.createObjectURL(wavBlob);
                const a = document.createElement('a');
                a.href = url; a.download = `timbre-chord-${Date.now()}.wav`; a.click();
            } catch (err) { console.error(err); } 
            finally { status.classList.add('hidden'); document.getElementById('exportModal').style.display = 'none'; }
        };

        function bufferTo64BitWav(buffer) {
            const samples = buffer.getChannelData(0);
            const view = new DataView(new ArrayBuffer(44 + samples.length * 8));
            const writeString = (view, offset, str) => { for (let i=0; i<str.length; i++) view.setUint8(offset + i, str.charCodeAt(i)); };
            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + samples.length * 8, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 3, true); // IEEE Float
            view.setUint16(22, 1, true);
            view.setUint32(24, 44100, true);
            view.setUint32(28, 44100 * 8, true);
            view.setUint16(32, 8, true);
            view.setUint16(34, 64, true);
            writeString(view, 36, 'data');
            view.setUint32(40, samples.length * 8, true);
            for (let i = 0; i < samples.length; i++) view.setFloat64(44 + i*8, samples[i], true);
            return new Blob([view], { type: 'audio/wav' });
        }

        function draw() {
            if (!isPlaying) return;
            requestAnimationFrame(draw);
            const dataArray = new Uint8Array(analyzer.frequencyBinCount);
            analyzer.getByteTimeDomainData(dataArray);
            canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
            canvasCtx.lineWidth = 2;
            canvasCtx.strokeStyle = '#60a5fa';
            canvasCtx.beginPath();
            const sliceWidth = canvas.width / analyzer.frequencyBinCount;
            let x = 0;
            for (let i = 0; i < analyzer.frequencyBinCount; i++) {
                const v = dataArray[i] / 128.0;
                const y = v * canvas.height / 2;
                if (i === 0) canvasCtx.moveTo(x, y); else canvasCtx.lineTo(x, y);
                x += sliceWidth;
            }
            canvasCtx.stroke();
        }

        function resize() { canvas.width = canvas.parentElement.clientWidth; canvas.height = 160; }
        window.addEventListener('resize', resize);
        resize();
        renderVoices();
        renderOvertones();
    </script>
</body>
</html>
