<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Scale Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        body {
            background: radial-gradient(circle at top center, #1e293b 0%, #0f172a 100%);
            color: #f8fafc;
            font-family: ui-sans-serif, system-ui, sans-serif;
        }

        .glass {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }

        .bit-active {
            text-shadow: 0 0 8px rgba(56, 189, 248, 0.8);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-results { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex flex-col items-center">

    <div class="max-w-3xl w-full space-y-6">
        <header class="text-center space-y-2 mb-8">
            <h1 class="text-5xl font-extrabold tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-sky-400 to-indigo-400">
                Binary Scale
            </h1>
            <p class="text-slate-400 font-medium">Map large integers to EDO microtonal structures.</p>
        </header>

        <section class="glass rounded-3xl p-6 shadow-2xl border border-white/10">
            <div class="space-y-4">
                <div class="flex justify-between items-end">
                    <label for="numberInput" class="text-sm font-semibold text-slate-400 ml-1 uppercase tracking-widest">Input Integer</label>
                    <button onclick="clearInput()" class="text-xs text-slate-500 hover:text-sky-400 transition-colors">Clear</button>
                </div>
                <textarea 
                    id="numberInput" 
                    placeholder="Enter number (separators like , and . are ignored)" 
                    class="w-full bg-slate-950/50 border border-slate-700 rounded-2xl p-5 text-sky-300 font-mono focus:ring-2 focus:ring-sky-500/50 focus:border-sky-500 outline-none transition-all resize-none h-32 text-lg"
                ></textarea>
                
                <button 
                    onclick="calculateScale()"
                    class="w-full bg-gradient-to-r from-sky-600 to-indigo-600 hover:from-sky-500 hover:to-indigo-500 text-white font-bold py-4 px-6 rounded-2xl transition-all shadow-lg hover:shadow-sky-500/20 active:scale-[0.98] flex items-center justify-center gap-2"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" />
                    </svg>
                    Generate Scale
                </button>
            </div>
        </section>

        <div id="errorMessage" class="hidden animate-results bg-red-500/10 border border-red-500/50 text-red-400 px-4 py-3 rounded-2xl text-sm text-center"></div>

        <main id="results" class="hidden space-y-6 animate-results">
            <div class="grid grid-cols-2 gap-4">
                <div class="glass p-5 rounded-2xl ring-1 ring-white/5">
                    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em]">Tuning System</span>
                    <p id="edoValue" class="text-2xl md:text-3xl font-bold text-white mt-1"></p>
                </div>
                <div class="glass p-5 rounded-2xl ring-1 ring-white/5">
                    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em]">Bit Complexity</span>
                    <p id="bitLength" class="text-2xl md:text-3xl font-bold text-white mt-1"></p>
                </div>
            </div>

            <div class="glass p-6 rounded-3xl space-y-4 relative overflow-hidden">
                <div class="flex justify-between items-center">
                    <h2 class="text-lg font-bold text-sky-300 flex items-center gap-2">
                        Scale Degrees
                        <span class="text-[10px] bg-sky-500/20 text-sky-400 px-2 py-0.5 rounded-full uppercase tracking-tighter">Unique Steps</span>
                    </h2>
                    <button id="copyBtn" onclick="copyToClipboard()" class="text-xs font-bold bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-xl text-slate-300 transition-all border border-white/5">
                        Copy Steps
                    </button>
                </div>
                <div id="stepsContainer" class="flex flex-wrap gap-2 max-h-64 overflow-y-auto pr-2 custom-scrollbar">
                    </div>
            </div>

            <div class="glass p-5 rounded-2xl">
                <span class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] block mb-3">Binary Sequence Map</span>
                <div id="binaryVisual" class="font-mono text-xs break-all text-slate-600 leading-relaxed tracking-widest bg-black/20 p-4 rounded-xl"></div>
            </div>
        </main>
    </div>

    <script>
        function calculateScale() {
            // Clean input by removing commas and periods
            const rawInput = document.getElementById('numberInput').value.trim();
            const cleanedInput = rawInput.replace(/[,.]/g, '');
            
            const errorDiv = document.getElementById('errorMessage');
            const resultsDiv = document.getElementById('results');
            const stepsContainer = document.getElementById('stepsContainer');
            const binaryVisual = document.getElementById('binaryVisual');
            
            errorDiv.classList.add('hidden');
            
            try {
                if (!cleanedInput) throw new Error("Please enter a numerical value.");
                
                // Validate if the result is actually a number string
                if (!/^\d+$/.test(cleanedInput)) throw new Error("Input contains invalid non-numeric characters.");

                const num = BigInt(cleanedInput);
                if (num <= 0n) throw new Error("Value must be a positive integer.");

                const binaryStr = num.toString(2);
                const bitLength = binaryStr.length;
                
                const edo = bitLength; 
                const maxStep = edo - 1;

                document.getElementById('edoValue').innerText = `${edo}-EDO`;
                document.getElementById('bitLength').innerText = `${bitLength}-bit`;

                let steps = [];
                let visualHtml = '';

                for (let i = 0; i < bitLength; i++) {
                    const bit = binaryStr[i];
                    const position = bitLength - 1 - i;
                    const edoStep = maxStep - position;

                    if (bit === '1') {
                        steps.push(edoStep);
                        visualHtml += `<span class="text-sky-400 font-bold bit-active">${bit}</span>`;
                    } else {
                        visualHtml += `<span>${bit}</span>`;
                    }
                }

                stepsContainer.innerHTML = steps.map(s => `
                    <div class="step-chip bg-sky-500/10 hover:bg-sky-500/20 border border-sky-500/30 px-3 py-1.5 rounded-lg text-sm font-mono text-sky-200 transition-all">
                        ${s}
                    </div>
                `).join('');

                binaryVisual.innerHTML = visualHtml;
                resultsDiv.classList.remove('hidden');

            } catch (e) {
                errorDiv.innerText = e.message;
                errorDiv.classList.remove('hidden');
                resultsDiv.classList.add('hidden');
            }
        }

        async function copyToClipboard() {
            const btn = document.getElementById('copyBtn');
            // Target only the inner text of the chips to avoid duplication
            const chips = Array.from(document.querySelectorAll('.step-chip'));
            const text = chips.map(el => el.innerText.trim()).join(', ');
            
            if (!text) return;

            try {
                await navigator.clipboard.writeText(text);
                const originalText = btn.innerText;
                btn.innerText = "Copied!";
                btn.classList.add('bg-emerald-600', 'text-white');
                
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.classList.remove('bg-emerald-600', 'text-white');
                }, 2000);
            } catch (err) {
                console.error('Failed to copy: ', err);
            }
        }

        function clearInput() {
            document.getElementById('numberInput').value = '';
            document.getElementById('results').classList.add('hidden');
            document.getElementById('errorMessage').classList.add('hidden');
        }
    </script>
</body>
</html>
